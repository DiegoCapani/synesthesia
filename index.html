<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --accent: #ffffff; --bg: #000000; }
        body { margin: 0; background: var(--bg); color: var(--accent); font-family: 'Courier New', Courier, monospace; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* Video nascosto, usiamo il canvas per l'output artistico */
        #video { display: none; }
        #canvas { position: absolute; width: 100vw; height: 100vh; object-fit: cover; filter: contrast(120%) brightness(80%); }
        
        #ui { z-index: 10; text-align: center; border: 1px solid var(--accent); padding: 40px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .label { font-size: 0.7em; letter-spacing: 5px; margin-bottom: 20px; opacity: 0.6; }
        h1 { font-size: 1.2em; font-weight: 300; margin-bottom: 30px; letter-spacing: 2px; }
        
        button { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 15px 30px; cursor: pointer; font-size: 0.8em; letter-spacing: 2px; transition: 0.3s; }
        button:hover { background: var(--accent); color: var(--bg); }

        /* Overlay per simulare la griglia digitale */
        .overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; z-index: 5; }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="label">CITTÀ VISIBILE 2026</div>
        <h1>STAZIONE 01: ECO-SINESTESIA</h1>
        <button id="startBtn">INIZIA SCANSIONE ONTOLOGICA</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const ui = document.getElementById('ui');

    // --- AUDIO ENGINE: SINTESI EVOLUTA ---
    const reverb = new Tone.Reverb({ decay: 8, wet: 0.6 }).toDestination();
    const lfo = new Tone.LFO("4n", 200, 1200).start();
    const filter = new Tone.Filter(800, "lowpass").connect(reverb);
    lfo.connect(filter.frequency);

    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 2, decay: 1, sustain: 1, release: 4 }
    }).connect(filter);
    synth.volume.value = -6;

    // Scala Pentatonica per un'armonia costante
    const notes = ["C3", "Eb3", "F3", "G3", "Bb3", "C4", "Eb4"];

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user', width: 640, height: 480 }, 
            audio: false 
        });
        video.srcObject = stream;
        await video.play();
        ui.style.opacity = '0';
        setTimeout(() => ui.style.display = 'none', 500);
        render();
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        await Tone.start();
        init();
    });

    let lastNote = "";

    function render() {
        // Low-Impact: elaboriamo a bassa risoluzione per risparmiare energia 
        const w = 40;
        const h = 40;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Disegniamo una versione pixelata sul canvas principale
        ctx.save();
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(video, 0, 0, w, h, 0, 0, canvas.width, canvas.height);
        
        // Analisi dati core
        const frame = ctx.getImageData(canvas.width/4, canvas.height/4, w, h);
        let r = 0, g = 0, b = 0;

        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i];
            g += frame.data[i + 1];
            b += frame.data[i + 2];
        }

        const count = frame.data.length / 4;
        r /= count; g /= count; b /= count;
        
        processSenses(r, g, b);
        
        // Effetto visivo "scanner": linea orizzontale che scorre
        const scanLine = (Date.now() % 2000) / 2000 * canvas.height;
        ctx.strokeStyle = `rgba(255,255,255,0.2)`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, scanLine);
        ctx.lineTo(canvas.width, scanLine);
        ctx.stroke();

        ctx.restore();
        requestAnimationFrame(render);
    }

    function processSenses(r, g, b) {
        const brightness = (r + g + b) / 3;
        
        // 1. Mappatura Nota (Basata su Luminosità)
        const noteIndex = Math.floor(map(brightness, 0, 255, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        // 2. Mappatura Filtro (Basata su componente Rossa - "Calore")
        const cutoff = map(r, 0, 255, 200, 4000);
        filter.frequency.rampTo(cutoff, 0.1);

        // 3. Mappatura LFO (Basata su componente Blu - "Profondità")
        const lfoSpeed = map(b, 0, 255, 0.1, 10);
        lfo.frequency.rampTo(lfoSpeed, 0.1);

        if (currentNote !== lastNote && brightness > 30) {
            synth.releaseAll();
            // Velocità d'attacco legata al Verde ("Vitalità")
            const velocity = map(g, 0, 255, 0.2, 0.6);
            synth.triggerAttack(currentNote, undefined, velocity);
            lastNote = currentNote;
        }
    }

    function map(v, iM, iX, oM, oX) {
        return (v - iM) * (oX - oM) / (iX - iM) + oM;
    }
</script>
</body>
</html>

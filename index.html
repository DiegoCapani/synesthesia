<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(1.1) contrast(1.1); }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: additive; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.3); padding: 40px; background: rgba(0,0,0,0.8); }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 35px; cursor: pointer; letter-spacing: 3px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <h1 style="font-weight: 100; letter-spacing: 2px;">ECO-SINESTESIA</h1>
            <button id="startBtn">ATTIVA SCANSIONE</button>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- AUDIO MEDITATIVO ---
    const reverb = new Tone.Reverb({ decay: 12, wet: 0.6 }).toDestination();
    const filter = new Tone.Filter(700, "lowpass").connect(reverb);
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 4, decay: 1, sustain: 1, release: 5 }
    }).connect(filter);
    
    // Master Volume con Gate
    const masterVol = new Tone.Volume(-Infinity).toDestination();
    synth.connect(masterVol);

    const notes = ["C4", "E4", "G4", "B4", "C5", "D5"];
    let prevData = null;
    let lastNote = "";

    async function start() {
        try {
            await Tone.start();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1000);
                render();
            };
        } catch (e) { alert("Camera non trovata."); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const tCanvas = document.createElement('canvas');
        tCanvas.width = 40; tCanvas.height = 40;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, 40, 40);
        const frame = tCtx.getImageData(0, 0, 40, 40);
        const data = frame.data;

        let totalR = 0, totalG = 0, totalB = 0;
        let changeCount = 0;

        if (prevData) {
            for (let i = 0; i < data.length; i += 4) {
                // Calcoliamo la differenza tra pixel
                const diff = Math.abs(data[i] - prevData[i]) + 
                             Math.abs(data[i+1] - prevData[i+1]) + 
                             Math.abs(data[i+2] - prevData[i+2]);
                
                // SOGLIA RUMORE: se la variazione è minore di 40, la ignoriamo (flicker della luce)
                if (diff > 40) {
                    changeCount += diff;
                }
                totalR += data[i]; totalG += data[i+1]; totalB += data[i+2];
            }
        }
        prevData = new Uint8ClampedArray(data);

        // Disegno particelle (solo se c'è luce sufficiente)
        for (let y = 0; y < 40; y += 2) {
            for (let x = 0; x < 40; x += 2) {
                const i = (y * 40 + x) * 4;
                if (data[i+1] > 160) { // verde come riferimento luminosità
                    ctx.fillStyle = `rgba(${data[i]}, ${data[i+1]}, ${data[i+2]}, 0.4)`;
                    ctx.beginPath();
                    ctx.arc((x/40)*canvas.width, (y/40)*canvas.height, data[i]/45, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }

        // --- GESTIONE LOGICA SILENZIO ---
        // changeCount è la somma delle variazioni reali. 
        // Se è molto bassa (solo rumore di fondo), silenziamo.
        if (changeCount < 25000) { 
            masterVol.volume.rampTo(-Infinity, 1.5); // Dissolvenza dolce al silenzio
        } else {
            masterVol.volume.rampTo(-8, 0.5); // Riattiva il suono
            
            const avgB = (totalR + totalG + totalB) / (40*40*3);
            const nIdx = Math.floor((avgB / 255) * notes.length);
            const note = notes[nIdx % notes.length];

            if (note !== lastNote && avgB > 40) {
                synth.releaseAll();
                synth.triggerAttack(note, "+0.1", 0.3);
                lastNote = note;
            }
        }
        
        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

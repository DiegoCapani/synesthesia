<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01 v05</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.8; filter: saturate(0.4) brightness(1.1); }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: screen; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 50px; background: rgba(0,0,0,0.9); }
        h1 { font-weight: 100; letter-spacing: 6px; margin-bottom: 30px; text-transform: uppercase; }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 45px; cursor: pointer; letter-spacing: 3px; font-size: 1em; transition: 0.3s; }
        button:hover { background: #fff; color: #000; }

        .version-tag { margin-top: 25px; font-size: 0.6em; letter-spacing: 4px; opacity: 0.4; text-transform: uppercase; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <div style="letter-spacing: 4px; font-size: 0.7em; margin-bottom: 10px; opacity: 0.5;">CITTÀ VISIBILE 2026</div>
            <h1>ECO-SINESTESIA</h1>
            <button id="startBtn">ATTIVA SCANSIONE</button>
            <div class="version-tag">STAZIONE 01 | v05</div>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- ENGINE AUDIO v05 (Triangle Wave per udibilità) ---
    const reverb = new Tone.Reverb({ decay: 10, wet: 0.5 }).toDestination();
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" }, // Più udibile della sine ma dolce
        envelope: { attack: 0.1, decay: 0.4, sustain: 0.8, release: 4 }
    }).connect(reverb);
    
    const masterGain = new Tone.Volume(-10).toDestination();
    synth.connect(masterGain);

    const notes = ["C4", "E4", "G4", "B4", "C5", "D5", "G5"];
    let prevData = null;
    let lastNote = "";

    async function start() {
        // Sblocco audio immediato
        await Tone.start();
        console.log("Audio is ready");
        
        // Segnale acustico di avvio (Feedback per l'utente)
        const welcomeSynth = new Tone.Synth().toDestination();
        welcomeSynth.triggerAttackRelease("C5", "8n");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1000);
                render();
            };
        } catch (e) { alert("Attiva fotocamera per procedere."); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const tCanvas = document.createElement('canvas');
        tCanvas.width = 40; tCanvas.height = 40;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, 40, 40);
        const data = tCtx.getImageData(0, 0, 40, 40).data;

        let movement = 0;
        let brightness = 0;

        if (prevData) {
            for (let i = 0; i < data.length; i += 4) {
                const d = Math.abs(data[i] - prevData[i]);
                if (d > 15) movement += d; 
                brightness += (data[i] + data[i+1] + data[i+2]) / 3;
            }
        }
        prevData = new Uint8ClampedArray(data);
        const avgB = brightness / (40 * 40);

        // --- GESTIONE SILENZIO v05 ---
        // Soglia molto bassa per non perdere reattività
        if (movement < 4000) { 
            masterGain.volume.rampTo(-Infinity, 0.5);
            if (lastNote !== "") { synth.releaseAll(); lastNote = ""; }
        } else {
            masterGain.volume.rampTo(-6, 0.2);
            
            const nIdx = Math.floor((avgB / 255) * notes.length);
            const currentNote = notes[nIdx % notes.length];

            if (currentNote !== lastNote && avgB > 30) {
                // Trigger immediato
                synth.triggerAttackRelease(currentNote, "1n", undefined, 0.5);
                lastNote = currentNote;
            }
        }

        // Feedback Visivo Sottile
        if (movement > 4000) {
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, movement/1000, 0, Math.PI*2);
            ctx.stroke();
        }

        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco-Sinestesia Stabilizzata</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    color: white;
    font-family: sans-serif;
}

#video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.55;
}

#canvas {
    position: absolute;
    width: 100%;
    height: 100%;
}

#ui {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: black;
    z-index: 10;
}

button {
    padding: 20px 40px;
    font-weight: bold;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <button id="startBtn">ATTIVA INSTALLAZIONE</button>
</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let prevData = null;

// =========================
// AUDIO STABILE (NO COLLASSO)
// =========================

const limiter = new Tone.Limiter(-1).toDestination();

const reverb = new Tone.Reverb({
    decay: 18,
    wet: 0.85
}).connect(limiter);

const synth = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 6,
    options: {
        oscillator: { type: "sine" },
        envelope: {
            attack: 1.5,
            decay: 0.5,
            sustain: 1,
            release: 6
        }
    }
}).connect(reverb);

const shimmer = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 4,
    options: {
        oscillator: { type: "triangle" },
        envelope: {
            attack: 1.2,
            decay: 0.5,
            sustain: 0.8,
            release: 5
        }
    }
}).connect(reverb);

const scale = [
"C3","D3","E3","G3","A3",
"C4","D4","E4","G4","A4",
"C5"
];

// 🎯 stato stabile (CHIAVE DEL FIX)
let currentNote = null;
let currentHarmony = null;

let lastChangeTime = 0;
let lastEnergy = 0;

async function startAudio() {
    await Tone.start();

    synth.triggerAttackRelease("C4","2n",undefined,0.4);
    shimmer.triggerAttackRelease("G4","2n",undefined,0.2);
}

async function start() {

    await startAudio();

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
    });

    video.srcObject = stream;

    video.onloadedmetadata = async () => {
        await video.play();

        ui.style.display = "none";
        resize();
        loop();
    };
}

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

window.addEventListener("resize", resize);

// =========================
// LOOP STABILE
// =========================

function loop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const grid = 30;

    const temp = document.createElement("canvas");
    temp.width = grid;
    temp.height = grid;
    const tctx = temp.getContext("2d");

    tctx.drawImage(video,0,0,grid,grid);
    const data = tctx.getImageData(0,0,grid,grid).data;

    let totalMove = 0;
    let activeX = 0;
    let activeCount = 0;

    for(let y=0;y<grid;y++){
        for(let x=0;x<grid;x++){

            const i=(y*grid+x)*4;
            const r=data[i],g=data[i+1],b=data[i+2];

            const bright=(r+g+b)/3;

            if(prevData){
                totalMove += Math.abs(r-prevData[i]);
            }

            if(bright>150){
                activeX += x;
                activeCount++;
            }
        }
    }

    prevData = new Uint8ClampedArray(data);

    const energy = Math.min(totalMove/3500,1);
    const smooth = lastEnergy*0.85 + energy*0.15;
    lastEnergy = smooth;

    const now = Tone.now();

    if(activeCount>0){

        const centerX = activeX/activeCount;

        const noteIndex = Math.floor((centerX/grid)*scale.length);
        const note = scale[Math.max(0,Math.min(noteIndex,scale.length-1))];

        const harmony = scale[Math.min(scale.length-1,noteIndex+2)];

        // 🔥 CAMBIO SOLO SE CAMBIA MOVIMENTO / POSIZIONE
        const shouldChange =
            note !== currentNote ||
            Math.abs(smooth - lastEnergy) > 0.2 ||
            now - lastChangeTime > 1.2;

        if(shouldChange){

            // rilascia prima di cambiare (fondamentale)
            synth.releaseAll();
            shimmer.releaseAll();

            synth.triggerAttack(note);
            shimmer.triggerAttack(harmony);

            currentNote = note;
            currentHarmony = harmony;
            lastChangeTime = now;
        }

    } else {
        synth.releaseAll();
        shimmer.releaseAll();
        currentNote = null;
        currentHarmony = null;
    }

    requestAnimationFrame(loop);
}

document.getElementById("startBtn").addEventListener("click",start);

</script>

</body>
</html>

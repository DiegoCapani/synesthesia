<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #video { display: none; }
        #canvas { width: 100vw; height: 100vh; object-fit: cover; }
        #ui { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 100; background: rgba(0,0,0,0.9);
            padding: 40px; border: 1px solid #fff; color: #fff;
        }
        button { 
            background: #fff; color: #000; border: none; padding: 15px 30px; 
            font-size: 1rem; cursor: pointer; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div style="letter-spacing: 5px; font-size: 0.8rem; margin-bottom: 10px;">CITTÀ VISIBILE 2026</div>
        <h1 style="font-weight: 300; margin-bottom: 30px;">ECO-SINESTESIA</h1>
        <button id="startBtn">ATTIVA SCANNER</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const ui = document.getElementById('ui');

    // --- ENGINE AUDIO CORRETTO ---
    // Limiter per evitare distorsioni nei "fuori scala"
    const limiter = new Tone.Limiter(-1).toDestination();
    const reverb = new Tone.Reverb({ decay: 4, wet: 0.4 }).connect(limiter);
    const filter = new Tone.Filter(1200, "lowpass").connect(reverb);
    
    // PolySynth più presente
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "amsine", harmonicity: 0.5 },
        envelope: { attack: 0.5, decay: 0.2, sustain: 0.5, release: 2 }
    }).connect(filter);
    
    synth.volume.value = -3; // Volume bilanciato

    const notes = ["C3", "Eb3", "F3", "G3", "Bb3", "C4"];

    async function start() {
        // Forza l'attivazione dell'audio su mobile
        await Tone.start();
        console.log("Audio pronto");

        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, audio: false 
        });
        video.srcObject = stream;
        
        ui.style.display = 'none';
        render();
    }

    document.getElementById('startBtn').addEventListener('click', start);

    let lastNote = "";

    function render() {
        const w = 64; // Analisi a bassa risoluzione (Immagine Statica/Pixel)
        const h = 64;
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Disegno base (Nero)
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Cattura frame corrente
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w;
        tempCanvas.height = h;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, w, h);
        const frame = tCtx.getImageData(0, 0, w, h);

        let r = 0, g = 0, b = 0;
        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i]; g += frame.data[i+1]; b += frame.data[i+2];
        }
        const avg = frame.data.length / 4;
        r /= avg; g /= avg; b /= avg;

        // --- EFFETTO FUORI SCALA VISIVO ---
        const offset = (g / 255) * 50; // Il movimento del verde sposta i canali
        
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        
        // Rendering scomposizione
        ctx.drawImage(video, offset, 0, canvas.width, canvas.height); // Canale Red-ish (spostato)
        ctx.filter = "hue-rotate(240deg) brightness(1.2)";
        ctx.drawImage(video, -offset, 0, canvas.width, canvas.height); // Canale Blue-ish (spostato)
        ctx.restore();

        updateAudio(r, g, b);
        requestAnimationFrame(render);
    }

    function updateAudio(r, g, b) {
        const brightness = (r + g + b) / 3;
        
        // Mappa la luminosità sulla scala pentatonica
        const nIdx = Math.floor(map(brightness, 0, 255, 0, notes.length - 1));
        const currentNote = notes[nIdx];

        // Il Filtro segue il Rosso (Calore)
        const fFreq = map(r, 0, 255, 300, 3000);
        filter.frequency.rampTo(fFreq, 0.1);

        // Suona solo se c'è abbastanza luce e la nota cambia
        if (currentNote !== lastNote && brightness > 40) {
            synth.releaseAll();
            // Il volume della nota dipende dal Verde
            const vel = map(g, 0, 255, 0.3, 0.8);
            synth.triggerAttack(currentNote, undefined, vel);
            lastNote = currentNote;
        }
    }

    function map(v, iMin, iMax, oMin, oMax) {
        return (v - iMin) * (oMax - oMin) / (iMax - iMin) + oMin;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        /* Il canvas sta SOPRA il video per creare la scomposizione */
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; mix-blend-mode: screen; pointer-events: none; }
        #ui { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 100; background: #000;
            padding: 30px; border: 1px solid #fff; color: #fff;
        }
        button { 
            background: #fff; color: #000; border: none; padding: 20px 40px; 
            font-size: 1.2rem; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <h2 style="letter-spacing: 3px;">CITTÀ VISIBILE 2026</h2>
        <p style="opacity: 0.7;">Analisi cromatica della fisionomia </p>
        <button id="startBtn">ATTIVA SINESTESIA</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // 1. Configurazione Audio migliorata per udibilità immediata
    const filter = new Tone.Filter(1500, "lowpass").toDestination();
    const synth = new Tone.PolySynth(Tone.Synth).connect(filter);
    synth.set({
        oscillator: { type: "sine" },
        envelope: { attack: 0.1, release: 1 }
    });
    synth.volume.value = 0; 

    const notes = ["C4", "D4", "E4", "G4", "A4", "C5"];

    async function startExperience() {
        // Sblocco Audio per Browser Mobile
        await Tone.start();
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user' }, 
                audio: false 
            });
            video.srcObject = stream;
            video.play();
            
            ui.style.display = 'none';
            render();
        } catch (err) {
            alert("Errore accesso camera: " + err);
        }
    }

    document.getElementById('startBtn').addEventListener('click', startExperience);

    let lastNote = "";

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Disegniamo sul canvas per estrarre i dati
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Analisi di una piccola porzione centrale per i dati (Low-Impact) [cite: 19]
        const checkSize = 50;
        const data = ctx.getImageData(canvas.width/2 - 25, canvas.height/2 - 25, checkSize, checkSize).data;
        
        let r = 0, g = 0, b = 0;
        for (let i = 0; i < data.length; i += 4) {
            r += data[i]; g += data[i+1]; b += data[i+2];
        }
        const totalPixels = data.length / 4;
        r /= totalPixels; g /= totalPixels; b /= totalPixels;

        // EFFETTO VISIVO: "Fuori Scala" 
        // Puliamo e ridisegnamo con sfasamento cromatico
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 0.5;
        
        // Spostiamo i canali in base al valore del colore (Fuori Scala)
        ctx.fillStyle = `rgb(${r}, 0, 0)`;
        ctx.fillRect(10, 0, canvas.width, canvas.height);
        ctx.fillStyle = `rgb(0, 0, ${b})`;
        ctx.fillRect(-10, 0, canvas.width, canvas.height);

        updateSound(r, g, b);
        requestAnimationFrame(render);
    }

    function updateSound(r, g, b) {
        const brightness = (r + g + b) / 3;
        const nIdx = Math.floor((brightness / 256) * notes.length);
        const currentNote = notes[nIdx];

        // Cambiamo il filtro in base al Rosso
        filter.frequency.rampTo(r * 10 + 200, 0.1);

        if (currentNote !== lastNote && brightness > 30) {
            synth.triggerAttackRelease(currentNote, "8n");
            lastNote = currentNote;
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01 v15</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.4; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: screen; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 0.8s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 40px; background: rgba(0,0,0,0.9); }
        button { background: #fff; color: #000; border: none; padding: 18px 40px; cursor: pointer; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        .version-tag { margin-top: 20px; font-size: 0.6em; letter-spacing: 4px; opacity: 0.5; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <div style="letter-spacing: 4px; font-size: 0.7em; margin-bottom: 10px; opacity: 0.6;">CITTÀ VISIBILE 2026</div>
            <h1 style="font-weight: 100; letter-spacing: 4px; margin-bottom: 30px;">ECO-SINESTESIA</h1>
            <button id="startBtn">INIZIA SCANSIONE</button>
            <div class="version-tag">STAZIONE 01 | v15</div>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- ENGINE AUDIO v15 ---
    const reverb = new Tone.Reverb({ decay: 12, wet: 0.5 }).toDestination();
    
    // FMSynth è perfetto per suoni New Age tipo "Campane di Cristallo"
    const synth = new Tone.FMSynth({
        harmonicity: 3,
        modulationIndex: 10,
        oscillator: { type: "sine" },
        modulation: { type: "sine" },
        envelope: { attack: 0.5, decay: 0.2, sustain: 1, release: 5 }
    }).connect(reverb);
    
    const masterGain = new Tone.Gain(0).toDestination();
    synth.connect(masterGain);

    const scale = ["C3", "E3", "G3", "B3", "C4", "D4", "E4", "G4", "A4", "B4", "C5"];
    let prevData = null;
    let lastNote = "";

    async function start() {
        await Tone.start();
        Tone.context.resume();
        
        // Risveglio forzato del canale audio
        const noise = new Tone.Noise("white").connect(new Tone.Gain(0.001).toDestination()).start();

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 800);
                render();
            };
        } catch (e) { alert("Accesso camera negato."); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const grid = 30; 
        const tCanvas = document.createElement('canvas');
        tCanvas.width = grid; tCanvas.height = grid;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, grid, grid);
        const data = tCtx.getImageData(0, 0, grid, grid).data;

        let totalMove = 0;
        let activeX = 0, activeY = 0, activeCount = 0;

        for (let y = 0; y < grid; y++) {
            for (let x = 0; x < grid; x++) {
                const i = (y * grid + x) * 4;
                const r = data[i], g = data[i+1], b = data[i+2];
                const bright = (r + g + b) / 3;

                if (prevData) totalMove += Math.abs(r - prevData[i]);

                if (bright > 140) {
                    activeX += x; activeY += y; activeCount++;
                    
                    // Sfere a COLORI v15 (Densità 50%)
                    if ((x + y) % 2 === 0) {
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.4)`;
                        ctx.beginPath();
                        ctx.arc((x/grid)*canvas.width, (y/grid)*canvas.height, bright/28, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }
        }
        prevData = new Uint8ClampedArray(data);

        // --- GESTIONE AUDIO v15 ---
        if (totalMove > 2000) { // Molto sensibile
            masterGain.gain.setTargetAtTime(0.8, Tone.now(), 0.2); 
            
            if (activeCount > 0) {
                const posX = activeX / activeCount;
                const noteIdx = Math.floor((posX / grid) * scale.length);
                const currentNote = scale[Tone.Math.clamp(noteIdx, 0, scale.length - 1)];

                if (currentNote !== lastNote) {
                    synth.triggerAttackRelease(currentNote, "1n", undefined, 0.5);
                    lastNote = currentNote;
                }
            }
        } else {
            // Silenzio se immobile
            masterGain.gain.setTargetAtTime(0, Tone.now(), 1.2);
            lastNote = "";
        }

        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

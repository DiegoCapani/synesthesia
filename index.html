<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eco-Sinestesia | Installazione Museale</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    overflow: hidden;
    height: 100vh;
}

#video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    opacity: 0.55;
}

#canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
    mix-blend-mode: screen;
}

#ui {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 100;
    transition: opacity 1s;
}

.container {
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 50px;
    background: rgba(0,0,0,0.9);
}

button {
    background: #fff;
    color: #000;
    border: none;
    padding: 20px 50px;
    cursor: pointer;
    letter-spacing: 3px;
    font-weight: bold;
    text-transform: uppercase;
}

.version-tag {
    margin-top: 25px;
    font-size: 0.7em;
    opacity: 0.5;
    letter-spacing: 4px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <div class="container">
        <div style="letter-spacing:4px;font-size:0.7em;opacity:0.6;">
            INSTALLAZIONE MUSEALE 2026
        </div>
        <h1 style="font-weight:100;letter-spacing:5px;">
            ECO-SINESTESIA
        </h1>
        <button id="startBtn">ATTIVA INSTALLAZIONE</button>
        <div class="version-tag">CORPO = SUONO</div>
    </div>
</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let prevData = null;

// =========================
// AUDIO INSTALLAZIONE
// =========================

const limiter = new Tone.Limiter(-0.3).toDestination();

const reverb = new Tone.Reverb({
    decay: 22,
    wet: 0.92
}).connect(limiter);

const delay = new Tone.FeedbackDelay({
    delayTime: "8n",
    feedback: 0.4,
    wet: 0.3
}).connect(reverb);

const chorus = new Tone.Chorus({
    frequency: 0.15,
    delayTime: 10,
    depth: 0.8,
    wet: 0.5
}).connect(delay);
chorus.start();

// 🔊 volume più alto (installazione fisica)
const masterGain = new Tone.Volume(2).connect(chorus);

// corpo sonoro principale
const synth = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 10,
    options: {
        oscillator: { type: "sine" },
        envelope: {
            attack: 1.8,
            decay: 0.6,
            sustain: 1,
            release: 10
        }
    }
}).connect(masterGain);

// layer etereo
const shimmer = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 8,
    options: {
        oscillator: { type: "triangle" },
        envelope: {
            attack: 1.5,
            decay: 0.8,
            sustain: 0.7,
            release: 8
        }
    }
}).connect(masterGain);

// scala armonica
const scale = [
"C3","D3","E3","G3","A3",
"C4","D4","E4","G4","A4",
"C5","D5"
];

async function initAudio() {
    await Tone.start();

    synth.triggerAttackRelease("C4","2n",undefined,0.6);
    shimmer.triggerAttackRelease("G4","1n",undefined,0.3);
}

async function start() {

    await initAudio();

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
    });

    video.srcObject = stream;

    video.onloadedmetadata = async () => {
        await video.play();

        ui.style.opacity = 0;
        setTimeout(()=>ui.style.display="none",1000);

        resize();
        loop();
    };
}

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

window.addEventListener("resize", resize);

// =========================
// INSTALLAZIONE SONORA
// =========================

function loop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const grid = 30;

    const temp = document.createElement("canvas");
    temp.width = grid;
    temp.height = grid;
    const tctx = temp.getContext("2d");

    tctx.drawImage(video,0,0,grid,grid);
    const data = tctx.getImageData(0,0,grid,grid).data;

    let totalMove = 0;
    let activeX = 0;
    let activeCount = 0;

    for(let y=0;y<grid;y++){
        for(let x=0;x<grid;x++){

            const i=(y*grid+x)*4;
            const r=data[i],g=data[i+1],b=data[i+2];

            const bright=(r+g+b)/3;

            if(prevData){
                totalMove += Math.abs(r-prevData[i]);
            }

            if(bright>150){
                activeX += x;
                activeCount++;

                ctx.fillStyle=`rgba(${r},${g},${b},0.25)`;
                ctx.beginPath();
                ctx.arc(
                    (x/grid)*canvas.width,
                    (y/grid)*canvas.height,
                    bright/25,0,Math.PI*2
                );
                ctx.fill();
            }
        }
    }

    prevData = new Uint8ClampedArray(data);

    const now = Tone.now();

    // energia del corpo nello spazio
    const energy = Math.min(totalMove/4000,1);

    let centerX = canvas.width/2;
    let noteIndex = 0;
    let note = "C4";

    if(activeCount>0){

        centerX = activeX/activeCount;

        noteIndex = Math.floor((centerX/grid)*scale.length);
        note = scale[Math.max(0,Math.min(noteIndex,scale.length-1))];

        // volume globale installazione
        const volume = -1 + energy*5;

        synth.volume.value = volume;
        shimmer.volume.value = volume - 4;

        // suono continuo del corpo (non a impulsi)
        synth.triggerAttack(note, now);

        const harmony = scale[Math.min(scale.length-1,noteIndex+2)];
        shimmer.triggerAttack(harmony, now);

    } else {
        synth.releaseAll();
        shimmer.releaseAll();
    }

    // visual centro energia
    if(activeCount>0){
        ctx.strokeStyle="white";
        ctx.beginPath();
        ctx.arc(canvas.width/2,canvas.height/2,20,0,Math.PI*2);
        ctx.stroke();
    }

    requestAnimationFrame(loop);
}

document.getElementById("startBtn").addEventListener("click",start);

</script>

</body>
</html>

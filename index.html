<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        #video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        
        #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1;
            background: #000;
        }

        #ui { 
            z-index: 10; 
            text-align: center; 
            transition: opacity 1s ease; 
        }

        h1 { 
            font-size: 1.8rem; 
            font-weight: 100; 
            letter-spacing: 8px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }

        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #debug-msg {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            color: #444;
            z-index: 11;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <h1>Synesthesia</h1>
        <button id="startBtn">Tocca per iniziare</button>
    </div>
    
    <div id="debug-msg"></div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');
    const debug = document.getElementById('debug-msg');

    // Setup Audio
    const reverb = new Tone.Reverb({ decay: 8, wet: 0.5 }).toDestination();
    const filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1.5, decay: 1, sustain: 0.8, release: 4 }
    }).connect(filter);
    synth.volume.value = 12; // Volume molto alto

    const notes = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5"];

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user' }, 
                audio: false 
            });
            video.srcObject = stream;
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
        } catch (err) {
            debug.innerText = "Errore Camera: " + err.message + ". Assicurati di usare HTTPS.";
            throw err;
        }
    }

    startBtn.addEventListener('click', async () => {
        debug.innerText = "Inizializzazione...";
        try {
            await Tone.start();
            await reverb.generate();
            await setupCamera();
            
            ui.style.opacity = "0";
            setTimeout(() => { ui.style.display = 'none'; }, 1000);
            
            // Fix dimensioni canvas immediato
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            draw();
        } catch (e) {
            console.error(e);
        }
    });

    function draw() {
        // Effetto eco
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Disegno video
        ctx.globalAlpha = 0.9;
        // Calcolo per mantenere le proporzioni (cover)
        const vRatio = video.videoWidth / video.videoHeight;
        const cRatio = canvas.width / canvas.height;
        let sx, sy, sw, sh;
        if (vRatio > cRatio) {
            sh = video.videoHeight;
            sw = sh * cRatio;
            sx = (video.videoWidth - sw) / 2;
            sy = 0;
        } else {
            sw = video.videoWidth;
            sh = sw / cRatio;
            sx = 0;
            sy = (video.videoHeight - sh) / 2;
        }
        
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0;

        // Analisi audio rapida
        analyzeAudio();
        
        requestAnimationFrame(draw);
    }

    function analyzeAudio() {
        // Analisi pixel centrale
        const pixel = ctx.getImageData(canvas.width/2, canvas.height/2, 1, 1).data;
        const r = pixel[0], g = pixel[1], b = pixel[2];
        const brightness = (r + g + b) / 3;
        
        updateSound(r, g, b, brightness);
    }

    let lastNote = "";
    function updateSound(r, g, b, brightness) {
        const noteIndex = Math.floor((brightness / 256) * notes.length);
        const currentNote = notes[noteIndex];

        filter.frequency.rampTo(400 + (r * 8), 0.1);

        if (currentNote !== lastNote && currentNote !== undefined) {
            synth.releaseAll();
            const velocity = 0.4 + (g / 512);
            synth.triggerAttack(currentNote, "+0.05", velocity);
            lastNote = currentNote;
        }
    }

    // Gestione ridimensionamento finestra
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>

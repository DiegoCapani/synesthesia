<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01 v12 Clean</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.5; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: screen; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 50px; background: rgba(0,0,0,0.9); }
        button { background: #fff; color: #000; border: none; padding: 20px 50px; cursor: pointer; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; }
        .version-tag { margin-top: 25px; font-size: 0.7em; letter-spacing: 4px; opacity: 0.5; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <div style="letter-spacing: 4px; font-size: 0.7em; margin-bottom: 10px; opacity: 0.6;">CITTÀ VISIBILE 2026</div>
            <h1 style="font-weight: 100; letter-spacing: 5px;">ECO-SINESTESIA</h1>
            <button id="startBtn">ATTIVA AUDIO E VIDEO</button>
            <div class="version-tag">STAZIONE 01 | v12 CLEAN</div>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    let audioStarted = false;
    
    // --- ENGINE AUDIO v12 CLEAN (No scoppiettii) ---
    const limiter = new Tone.Limiter(-2).toDestination();
    const reverb = new Tone.Reverb({ decay: 10, wet: 0.5 }).connect(limiter);
    
    // Passaggio a Sine wave con attacco più dolce per eliminare i "pop"
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" }, 
        envelope: { attack: 0.4, decay: 0.5, sustain: 1, release: 4 }
    }).connect(reverb);
    
    // Volume bilanciato per evitare distorsione di buffer
    const masterGain = new Tone.Volume(-6).connect(limiter); 
    synth.connect(masterGain);

    const scale = ["C3", "G3", "C4", "D4", "E4", "G4", "A4", "B4", "D5"];
    let prevData = null;
    let lastNote = "";

    async function initAudio() {
        await Tone.start();
        Tone.context.resume();
        
        const osc = new Tone.Oscillator().connect(masterGain).start();
        osc.stop("+0.1");
        
        audioStarted = true;
    }

    async function start() {
        await initAudio();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1000);
                render();
            };
        } catch (e) { alert("Camera non trovata."); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const grid = 30; 
        const tCanvas = document.createElement('canvas');
        tCanvas.width = grid; tCanvas.height = grid;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, grid, grid);
        const data = tCtx.getImageData(0, 0, grid, grid).data;

        let totalMove = 0;
        let activeX = 0, activeCount = 0;

        for (let y = 0; y < grid; y++) {
            for (let x = 0; x < grid; x++) {
                const i = (y * grid + x) * 4;
                const r = data[i], g = data[i+1], b = data[i+2];
                const bright = (r + g + b) / 3;

                if (prevData) totalMove += Math.abs(r - prevData[i]);

                if (bright > 150) {
                    activeX += x; activeCount++;
                    if ((x + y) % 2 === 0) {
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.3)`;
                        ctx.beginPath();
                        ctx.arc((x/grid)*canvas.width, (y/grid)*canvas.height, bright/25, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }
        }
        prevData = new Uint8ClampedArray(data);

        // --- GESTIONE AUDIO v12 CLEAN ---
        if (totalMove > 2500) { 
            // Rampa di volume fluida invece di scatto netto
            masterGain.volume.rampTo(-6, 0.2); 
            
            if (activeCount > 0) {
                const centerX = activeX / activeCount;
                const noteIdx = Math.floor((centerX / grid) * scale.length);
                const currentNote = scale[Math.max(0, Math.min(noteIdx, scale.length - 1))];

                if (currentNote !== lastNote) {
                    synth.triggerAttackRelease(currentNote, "1n", undefined, 0.5);
                    lastNote = currentNote;
                }
                
                ctx.strokeStyle = "white";
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, 20, 0, Math.PI*2);
                ctx.stroke();
            }
        } else {
            masterGain.volume.rampTo(-Infinity, 1.5);
            lastNote = "";
        }

        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

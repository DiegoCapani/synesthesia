<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        #video { display: none; }
        
        #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1;
        }

        #ui { 
            z-index: 10; 
            text-align: center; 
            transition: opacity 1s ease;
        }
        h1 { 
            font-size: 1.8rem; 
            font-weight: 100; 
            letter-spacing: 8px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }
        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <h1>Synesthesia</h1>
        <button id="startBtn">Tocca per iniziare</button>
        <p id="errorNote" style="color:red; display:none; margin-top:20px;">
            Errore: Camera non accessibile.<br>Verifica di essere su un sito HTTPS.
        </p>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');
    const errorNote = document.getElementById('errorNote');

    // --- SETUP AUDIO NEW AGE (Testato) ---
    
    // 1. Riverbero generato esplicitamente
    const reverb = new Tone.Reverb({ decay: 10, wet: 0.6 }).toDestination();
    
    // Ammorbidiamo i synth
    const filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    
    // Synth Principale
    const synthBase = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" },
        envelope: { attack: 1.5, decay: 2, sustain: 0.8, release: 4 }
    }).connect(filter);
    synthBase.volume.value = -8;

    // Synth Cristallino (FM)
    const synthCrystal = new Tone.PolySynth(Tone.FMSynth, {
        harmonicity: 3.01, modulationIndex: 3,
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 0.3, sustain: 0.1, release: 3 },
    }).connect(filter);
    synthCrystal.volume.value = -16;

    // Master Volume
    Tone.Destination.volume.value = 6;

    const notes = ["F3", "G3", "A3", "B3", "C4", "E4", "F4", "G4", "A4"];

    // Controllo HTTPS/Secure Context
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        startBtn.style.display = 'none';
        errorNote.style.display = 'block';
    }

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => video.onloadedmetadata = resolve);
    }

    let firstFrame = true;

    startBtn.addEventListener('click', async () => {
        try {
            // Avvio audio e generazione riverbero obbligatoria
            await Tone.start();
            await reverb.generate(); // <--- FIX AUDIO
            
            await setupCamera();
            
            // Scomparsa interfaccia
            ui.style.opacity = "0";
            setTimeout(() => { ui.style.display = 'none'; }, 1000);
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            analyzeAndDraw();
        } catch (e) {
            console.error(e);
            errorNote.style.display = 'block';
        }
    });

    function analyzeAndDraw() {
        // --- EFFETTO ECO VISIVO (Fixato) ---
        if (firstFrame) {
            // Il primo frame disegna il video pieno senza eco
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            firstFrame = false;
        } else {
            // I frame successivi applicano la scia
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.globalAlpha = 0.85; 
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1.0; 
        }

        // --- ANALISI PER SUONO ---
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
        tempCanvas.width = 16; tempCanvas.height = 16;
        tempCtx.drawImage(video, 0, 0, 16, 16);
        
        const frame = tempCtx.getImageData(4, 4, 8, 8);
        let r = 0, g = 0, b = 0;
        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i]; g += frame.data[i + 1]; b += frame.data[i + 2];
        }
        const count = frame.data.length / 4;
        r /= count; g /= count; b /= count;

        updateSound(r, g, b);
        requestAnimationFrame(analyzeAndDraw);
    }

    let lastNote = "";

    function updateSound(r, g, b) {
        const brightness = (r + g + b) / 3;
        const noteIndex = Math.floor(mapRange(brightness, 0, 255, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        if (currentNote !== lastNote) {
            synthBase.releaseAll("+0.2");
            synthCrystal.releaseAll("+0.1");
            const vel = mapRange(g, 0, 255, 0.3, 0.7);
            synthBase.triggerAttack(currentNote, Tone.now(), vel);
            synthCrystal.triggerAttack(currentNote, "+0.3", vel * 0.4);
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }
</script>
</body>
</html>

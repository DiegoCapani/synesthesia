<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: screen; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 40px; }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; cursor: pointer; letter-spacing: 3px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <h1 style="font-weight: 100; letter-spacing: 5px;">STAZIONE 01</h1>
            <button id="startBtn">ATTIVA SINESTESIA</button>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // AUDIO SETUP
    const reverb = new Tone.Reverb({ decay: 10, wet: 0.6 }).toDestination();
    const delay = new Tone.FeedbackDelay("4n", 0.3).connect(reverb);
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1.5, release: 4 }
    }).connect(delay);
    synth.volume.value = -8;

    const scale = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5"];
    let avgBright = 0;

    async function start() {
        await Tone.start();
        await Tone.context.resume(); // CRUCIALE per il suono
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1000);
                
                // Arpeggiatore melodico
                const loop = new Tone.Loop(time => {
                    if (avgBright > 40) {
                        const note = scale[Math.floor(Tone.Math.mapLinear(avgBright, 40, 200, 0, scale.length - 1))];
                        synth.triggerAttackRelease(note, "2n", time, 0.4);
                    }
                }, "4n").start(0);
                
                Tone.Transport.start();
                render();
            };
        } catch (e) { alert("Attiva fotocamera"); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Analisi Pixel (Griglia 20x20)
        const size = 20;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = size; tempCanvas.height = size;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, size, size);
        const pixels = tCtx.getImageData(0, 0, size, size).data;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let totalBrightness = 0;
        const cellW = canvas.width / size;
        const cellH = canvas.height / size;

        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                const i = (y * size + x) * 4;
                const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
                const bright = (r + g + b) / 3;
                totalBrightness += bright;

                if (bright > 130) { // Disegna sfere solo sulle zone luminose (viso)
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.4)`;
                    ctx.beginPath();
                    // Coordinate mappate correttamente sulla griglia del volto
                    ctx.arc(x * cellW + cellW/2, y * cellH + cellH/2, bright/8, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        avgBright = totalBrightness / (size * size);
        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

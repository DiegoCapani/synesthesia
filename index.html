<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        #video, #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.5; 
        }
        #ui { 
            z-index: 10; 
            text-align: center; 
            background: rgba(0,0,0,0.5); 
            padding: 30px; 
            border: 1px solid #ffffff; 
        }
        button { 
            background: transparent; 
            color: #ffffff; 
            border: 1px solid #ffffff; 
            padding: 12px 24px; 
            cursor: pointer; 
            font-family: inherit; 
            font-size: 0.8em; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .label { margin-bottom: 15px; font-size: 1em; text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="label">Synesthesia</div>
        <button id="startBtn">Tocca per iniziare</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    const reverb = new Tone.Reverb({ decay: 5, wet: 0.5 }).toDestination();
    const filter = new Tone.Filter(1200, "lowpass").connect(reverb);
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 1, sustain: 0.8, release: 4 } // Release lungo per fluidità
    }).connect(filter);

    synth.volume.value = 6;

    const notes = ["C3", "G3", "C4", "D4", "E4", "G4", "A4", "C5"];
    
    // Variabili di controllo movimento e stabilità
    let lastBrightness = 0;
    let minObs = 255;
    let maxObs = 0;
    let lastNote = "";
    let isPlaying = false;

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        video.srcObject = stream;
        return new Promise((resolve) => video.onloadedmetadata = resolve);
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        ui.style.display = 'none'; 
        analyze();
    });

    function analyze() {
        canvas.width = 64; 
        canvas.height = 64;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const frame = ctx.getImageData(16, 16, 32, 32);
        let r = 0, g = 0, b = 0;
        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i]; g += frame.data[i + 1]; b += frame.data[i + 2];
        }
        const count = frame.data.length / 4;
        r /= count; g /= count; b /= count;
        
        let currentBright = (r + g + b) / 3;

        // 1. RILEVAMENTO MOVIMENTO (Delta)
        // Se la differenza tra i frame è minima, consideriamo "nessun movimento"
        let motionDelta = Math.abs(currentBright - lastBrightness);
        
        // Soglia di silenzio (regola questo valore se è troppo sensibile)
        const silenceThreshold = 0.4; 

        if (motionDelta > silenceThreshold) {
            // C'è movimento: aggiorna i limiti di luce
            if (currentBright < minObs) minObs = currentBright;
            if (currentBright > maxObs) maxObs = currentBright;
            
            let range = maxObs - minObs;
            if (range < 20) range = 20;

            let norm = (currentBright - minObs) / range;
            norm = Math.max(0, Math.min(1, norm));

            updateSound(norm, r, true);
            isPlaying = true;
        } else {
            // Nessun movimento: silenzia gradualmente
            if (isPlaying) {
                synth.releaseAll();
                isPlaying = false;
                lastNote = ""; // Resetta per permettere il riattacco
            }
        }

        lastBrightness = currentBright;
        
        // Auto-riequilibrio dei sensori
        minObs += 0.05;
        maxObs -= 0.05;

        requestAnimationFrame(analyze);
    }

    function updateSound(norm, r, shouldPlay) {
        const noteIndex = Math.floor(norm * (notes.length - 1));
        const currentNote = notes[noteIndex];

        filter.frequency.rampTo(mapRange(r, 0, 150, 400, 2500), 0.4);

        // Cambia nota solo se è diversa dalla precedente per evitare "vibrazioni"
        if (currentNote !== lastNote && shouldPlay) {
            synth.releaseAll();
            synth.triggerAttack(currentNote, "+0.05", 0.5);
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }
</script>
</body>
</html>

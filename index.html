<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        /* Video nascosto, usiamo il canvas per l'eco */
        #video { display: none; }
        
        #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; /* Sotto l'UI all'inizio */
        }

        #ui { 
            z-index: 10; 
            text-align: center; 
            transition: opacity 1s ease;
        }
        h1 { 
            font-size: 1.8rem; 
            font-weight: 100; 
            letter-spacing: 8px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }
        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <h1>Synesthesia</h1>
        <button id="startBtn">Tocca per iniziare</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    // --- CONFIGURAZIONE AUDIO NEW AGE AVANZATA ---
    
    // Riverbero molto lungo e spaziale
    const reverb = new Tone.Reverb({ decay: 12, wet: 0.7 }).toDestination();
    // Filtro per ammorbidire le frequenze alte
    const filter = new Tone.Filter(1200, "lowpass").connect(reverb);
    
    // 1. Sintetizzatore Principale (Tappeto sonoro morbido)
    const synthBase = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" }, // Onda più dolce della sine
        envelope: { attack: 2, decay: 2, sustain: 0.9, release: 5 }
    }).connect(filter);
    synthBase.volume.value = -6; // Abbassiamo per mixare

    // 2. Sintetizzatore Cristallino (Armoniche FM tipiche New Age)
    const synthCrystal = new Tone.PolySynth(Tone.FMSynth, {
        harmonicity: 3.01,
        modulationIndex: 4,
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 0.3, sustain: 0.1, release: 4 },
        modulation: { type: "square" },
        modulationEnvelope: { attack: 0.5, decay: 0.2, sustain: 1, release: 2 }
    }).connect(filter);
    synthCrystal.volume.value = -12; // Suono di contorno cristallino

    // Master Volume alzato
    Tone.Destination.volume.value = 8;

    // Scala Pentatonica Lidia (molto sognante/New Age)
    const notes = ["F3", "G3", "A3", "B3", "C4", "E4", "F4", "G4", "A4", "B4", "C5", "E5"];

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => video.onloadedmetadata = resolve);
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        
        // Scomparsa totale dell'interfaccia
        ui.style.opacity = "0";
        setTimeout(() => { ui.style.display = 'none'; }, 1000);
        
        // Impostiamo le dimensioni del canvas uguali al video per l'eco
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        analyzeAndDraw();
    });

    function analyzeAndDraw() {
        // --- EFFETTO ECO VISIVO (Persistenza) ---
        // Invece di cancellare il frame, disegniamo un rettangolo nero semi-trasparente
        // Sopra il frame precedente, creando una scia.
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // Più basso è il valore (0.15), più lunga è l'eco
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Disegniamo il video attuale sopra con un po' di trasparenza
        ctx.globalAlpha = 0.8; 
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0; // Resettiamo

        // --- ANALISI CROMATICA ---
        // Usiamo un canvas temporaneo piccolissimo per l'analisi per performance
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
        tempCanvas.width = 16;
        tempCanvas.height = 16;
        tempCtx.drawImage(video, 0, 0, 16, 16);
        
        const frame = tempCtx.getImageData(4, 4, 8, 8);
        let r = 0, g = 0, b = 0;

        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i];
            g += frame.data[i + 1];
            b += frame.data[i + 2];
        }

        const count = frame.data.length / 4;
        r /= count; g /= count; b /= count;

        updateSound(r, g, b);
        requestAnimationFrame(analyzeAndDraw);
    }

    let lastNote = "";

    function updateSound(r, g, b) {
        const brightness = (r + g + b) / 3;
        const saturation = Math.max(r, g, b) - Math.min(r, g, b);
        
        const noteIndex = Math.floor(mapRange(brightness, 0, 255, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        if (currentNote !== lastNote) {
            // Rilascio dolce
            synthBase.releaseAll("+0.5");
            synthCrystal.releaseAll("+0.1");

            // Velocity basata sulla luminosità
            const vel = mapRange(g, 0, 255, 0.3, 0.7);
            
            // Suoniamo entrambi i synth per profondità New Age
            synthBase.triggerAttack(currentNote, Tone.now(), vel);
            
            // Il synth cristallino suona solo se i colori sono saturi
            if (saturation > 30) {
                synthCrystal.triggerAttack(currentNote, "+0.2", vel * 0.5);
            }
            
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* Interfaccia Minimalista: Nero e Bianco */
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        /* Video e Canvas occupano tutto lo schermo */
        #video { display: none; }
        #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1;
        }

        /* UI sovrapposta inizialmente */
        #ui { 
            z-index: 10; 
            text-align: center; 
            transition: opacity 1s ease; /* Dissolvenza fluida */
        }

        h1 { 
            font-size: 1.8rem; 
            font-weight: 100; 
            letter-spacing: 8px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }

        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: inherit;
        }

        button:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <h1>Synesthesia</h1>
        <button id="startBtn">Tocca per iniziare</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    // Configurazione Audio New Age
    const reverb = new Tone.Reverb({ decay: 8, wet: 0.5 }).toDestination();
    const filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1.5, decay: 1, sustain: 0.8, release: 4 }
    }).connect(filter);

    // INCREMENTO VOLUME (Valore espresso in decibel)
    synth.volume.value = 10; 

    const notes = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5"];

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => video.onloadedmetadata = resolve);
    }

    let isAnalysing = false;

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await reverb.generate(); // Pre-genera il riverbero per evitare glitch
        await setupCamera();
        
        // Rimuove l'interfaccia (titolo e bottone) con dissolvenza
        ui.style.opacity = "0";
        setTimeout(() => { ui.style.display = 'none'; }, 1000);
        
        // Imposta dimensioni canvas
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        isAnalysing = true;
        analyze();
    });

    function analyze() {
        if (!isAnalysing) return;

        // Effetto "Eco Visivo" (Persistence)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.globalAlpha = 0.85; 
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0;

        // Analisi cromatica su area ridotta per performance
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = 16;
        tempCanvas.height = 16;
        tempCtx.drawImage(video, 0, 0, 16, 16);
        
        const frame = tempCtx.getImageData(4, 4, 8, 8);
        let r = 0, g = 0, b = 0;

        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i];
            g += frame.data[i + 1];
            b += frame.data[i + 2];
        }

        const count = frame.data.length / 4;
        r /= count; g /= count; b /= count;

        updateSound(r, g, b);
        requestAnimationFrame(analyze);
    }

    let lastNote = "";

    function updateSound(r, g, b) {
        const brightness = (r + g + b) / 3;
        const noteIndex = Math.floor(mapRange(brightness, 0, 255, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        // Filtro influenzato dal rosso dell'incarnato
        filter.frequency.rampTo(mapRange(r, 0, 255, 400, 2500), 0.5);

        if (currentNote !== lastNote) {
            synth.releaseAll();
            // Il volume individuale della nota dipende dalla saturazione (verde)
            const velocity = mapRange(g, 0, 255, 0.4, 0.8);
            synth.triggerAttack(currentNote, "+0.1", velocity);
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        #video, #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.5; 
        }
        
        #ui { 
            z-index: 10; 
            text-align: center; 
            background: rgba(0,0,0,0.5); 
            padding: 30px; 
            border: 1px solid #ffffff; 
            transition: opacity 0.5s ease;
        }
        
        button { 
            background: transparent; 
            color: #ffffff; 
            border: 1px solid #ffffff; 
            padding: 12px 24px; 
            cursor: pointer; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            font-size: 0.8em; 
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        button:hover { 
            background: #ffffff; 
            color: #000; 
        }
        
        .label { 
            margin-bottom: 15px; 
            font-size: 1em; 
            text-transform: uppercase;
            letter-spacing: 3px; 
            opacity: 0.8;
        }

        #status {
            font-size: 0.7em;
            margin-top: 15px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="label">Synesthesia</div>
        <button id="startBtn">Tocca per iniziare</button>
        <p id="status">...|||...</p>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    // Audio Setup
    const reverb = new Tone.Reverb({ decay: 5, wet: 0.5 }).toDestination();
    const filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 1, sustain: 0.8, release: 3 }
    }).connect(filter);

    synth.volume.value = 8; 

    const notes = ["C3", "G3", "C4", "D4", "E4", "G4", "A4", "C5"];
    
    let prevFrame = null;
    let lastNote = "";
    let isPlaying = false;

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => video.onloadedmetadata = resolve);
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        ui.style.display = 'none'; 
        analyze();
    });

    function analyze() {
        // Disegno diretto senza accumulo per eliminare l'effetto ghost
        canvas.width = 64; 
        canvas.height = 64;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let motionTotal = 0;
        let rSum = 0, gSum = 0, bSum = 0;

        if (prevFrame) {
            for (let i = 0; i < currentFrame.data.length; i += 4) {
                // Rilevamento movimento pixel per pixel
                const diff = Math.abs(currentFrame.data[i] - prevFrame.data[i]);
                if (diff > 15) motionTotal += diff; 

                rSum += currentFrame.data[i];
                gSum += currentFrame.data[i+1];
                bSum += currentFrame.data[i+2];
            }
        }
        
        prevFrame = currentFrame;

        const count = canvas.width * canvas.height;
        const r = rSum / count;
        const g = gSum / count;
        const b = bSum / count;
        const avgBright = (r + g + b) / 3;

        // Soglia di movimento dinamica per attivare/disattivare il suono
        if (motionTotal > 3000) { 
            updateSound(r, g, b, avgBright, true);
            isPlaying = true;
        } else {
            if (isPlaying) {
                synth.releaseAll();
                isPlaying = false;
                lastNote = "";
            }
        }

        requestAnimationFrame(analyze);
    }

    function updateSound(r, g, b, brightness, shouldPlay) {
        // Normalizzazione per tonalità scure: mappa 0-120 invece di 0-255
        const noteIndex = Math.floor(mapRange(Math.min(brightness, 120), 0, 120, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        // Filtro legato al canale rosso (viso/pelle)
        filter.frequency.rampTo(mapRange(Math.min(r, 150), 0, 150, 400, 2500), 0.3);

        if (currentNote !== lastNote && shouldPlay) {
            synth.releaseAll();
            // Volume di attacco bilanciato
            synth.triggerAttack(currentNote, "+0.05", 0.5);
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Helvetica', sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        #video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.2; /* Molto soffuso per focus sull'interfaccia */
            filter: grayscale(100%);
        }
        #ui { 
            z-index: 10; 
            text-align: center; 
        }
        h1 { 
            font-size: 3rem; 
            font-weight: 100; 
            letter-spacing: 12px; 
            margin-bottom: 40px; 
            text-transform: uppercase;
        }
        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 15px 40px; 
            cursor: pointer; 
            font-size: 1rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }
        #status { 
            margin-top: 20px; 
            font-size: 0.7rem; 
            letter-spacing: 4px; 
            opacity: 0.5; 
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div id="ui">
        <h1>Synesthesia</h1>
        <button id="startBtn">Tocca per iniziare</button>
        <p id="status">SISTEMA OFFLINE</p>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');

    // CATENA AUDIO AVANZATA PER VOLUME ALTO E ZERO SCOPPIETTII
    const limiter = new Tone.Limiter(-1).toDestination(); // Evita distorsioni
    const compressor = new Tone.Compressor({
        threshold: -20,
        ratio: 4,
        attack: 0.05,
        release: 0.1
    }).connect(limiter);

    const reverb = new Tone.Reverb({ decay: 8, wet: 0.6 }).connect(compressor);
    const filter = new Tone.Filter(800, "lowpass").connect(reverb);
    
    // PolySynth con inviluppi molto dolci
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { 
            attack: 1.5,   // Attacco molto lento per eliminare il "pop" iniziale
            decay: 2, 
            sustain: 1, 
            release: 5     // Rilascio lunghissimo per fluidità New Age
        }
    }).connect(filter);

    // Volume generale alzato (Tone.js usa i decibel, +6 o +10 è un aumento sensibile)
    synth.volume.value = 8; 

    const notes = ["F3", "G3", "A3", "C4", "D4", "F4", "G4", "A4"];

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: 320, height: 240 }, 
                audio: false 
            });
            video.srcObject = stream;
            return new Promise((resolve) => video.onloadedmetadata = resolve);
        } catch (e) {
            statusText.innerText = "ERRORE CAMERA";
        }
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        startBtn.style.display = 'none';
        statusText.innerText = "ANALISI CROMATICA ATTIVA";
        analyze();
    });

    function analyze() {
        canvas.width = 32;
        canvas.height = 32;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const frame = ctx.getImageData(8, 8, 16, 16);
        let r = 0, g = 0, b = 0;

        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i];
            g += frame.data[i + 1];
            b += frame.data[i + 2];
        }

        const count = frame.data.length / 4;
        r /= count; g /= count; b /= count;

        updateSound(r, g, b);
        // Analisi ogni 100ms per evitare sovraccarico e "jitter" sonoro
        setTimeout(analyze, 100); 
    }

    let lastNote = "";

    function updateSound(r, g, b) {
        const brightness = (r + g + b) / 3;
        const noteIndex = Math.floor(mapRange(brightness, 0, 255, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        // Filtro fluido (rampTo evita scatti udibili)
        const filterFreq = mapRange(g, 0, 255, 300, 1500);
        filter.frequency.rampTo(filterFreq, 0.2);

        if (currentNote !== lastNote) {
            // Rilascio graduale delle note precedenti invece di un distacco netto
            synth.releaseAll("+0.1");
            // Volume della nota basato sulla componente rossa (più dinamica)
            const velocity = mapRange(r, 0, 255, 0.3, 0.8);
            synth.triggerAttack(currentNote, "+0.2", velocity);
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        let res = (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
        return Math.max(outMin, Math.min(outMax, res)); // Clamping per sicurezza
    }
</script>
</body>
</html>

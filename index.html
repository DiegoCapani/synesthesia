<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        #video, #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.5; 
        }
        #ui { 
            z-index: 10; 
            text-align: center; 
            background: rgba(0,0,0,0.5); 
            padding: 30px; 
            border: 1px solid #ffffff; 
        }
        button { 
            background: transparent; 
            color: #ffffff; 
            border: 1px solid #ffffff; 
            padding: 12px 24px; 
            cursor: pointer; 
            font-family: inherit; 
            font-size: 0.8em; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .label { margin-bottom: 15px; font-size: 1em; text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="label">Synesthesia</div>
        <button id="startBtn">Tocca per iniziare</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    const reverb = new Tone.Reverb({ decay: 5, wet: 0.5 }).toDestination();
    const filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 1, sustain: 0.8, release: 4 }
    }).connect(filter);

    synth.volume.value = 8;

    const notes = ["C3", "G3", "C4", "D4", "E4", "G4", "A4", "C5"];
    
    let prevFrame = null;
    let lastNote = "";
    let isPlaying = false;

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        video.srcObject = stream;
        return new Promise((resolve) => video.onloadedmetadata = resolve);
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        ui.style.display = 'none'; 
        analyze();
    });

    function analyze() {
        canvas.width = 64; 
        canvas.height = 64;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let motionTotal = 0;
        let brightnessSum = 0;

        if (prevFrame) {
            for (let i = 0; i < currentFrame.data.length; i += 4) {
                // Calcola la differenza di movimento (pixel per pixel)
                const diff = Math.abs(currentFrame.data[i] - prevFrame.data[i]);
                if (diff > 20) motionTotal += diff; // Soglia per ignorare il rumore digitale
                
                brightnessSum += currentFrame.data[i];
            }
        }
        
        prevFrame = currentFrame;

        const avgBrightness = brightnessSum / (canvas.width * canvas.height);
        
        // SOGLIA MOVIMENTO: Se il movimento totale è superiore a 5000 (valore empirico molto sensibile)
        if (motionTotal > 5000) {
            // Mappa la luminosità sulla nota
            const norm = Math.min(1, avgBrightness / 150); 
            updateSound(norm, true);
            isPlaying = true;
        } else {
            // Se non c'è abbastanza movimento, rilascia le note
            if (isPlaying) {
                synth.releaseAll();
                isPlaying = false;
                lastNote = "";
            }
        }

        requestAnimationFrame(analyze);
    }

    function updateSound(norm, shouldPlay) {
        const noteIndex = Math.floor(norm * (notes.length - 1));
        const currentNote = notes[noteIndex];

        if (currentNote !== lastNote && shouldPlay) {
            synth.releaseAll();
            synth.triggerAttack(currentNote, "+0.05", 0.5);
            lastNote = currentNote;
            
            // Apriamo il filtro dinamicamente con il movimento
            filter.frequency.rampTo(600 + (norm * 2000), 0.3);
        }
    }
</script>
</body>
</html>

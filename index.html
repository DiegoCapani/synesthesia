<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.8; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: additive; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1.5s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 40px; background: rgba(0,0,0,0.9); }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; cursor: pointer; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <div style="letter-spacing: 5px; font-size: 0.7em; margin-bottom: 10px; opacity: 0.5;">CITTÀ VISIBILE 2026</div>
            <h1 style="font-weight: 100; margin-bottom: 30px;">ECO-SINESTESIA</h1>
            <button id="startBtn">INIZIA MEDITAZIONE</button>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- SOUND ENGINE MEDITATIVO ---
    const reverb = new Tone.Reverb({ decay: 15, wet: 0.7 }).toDestination();
    const lowPass = new Tone.Filter(600, "lowpass").connect(reverb);
    
    // Melodia (Gocce luminose)
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 2, decay: 1, sustain: 0.5, release: 5 }
    }).connect(lowPass);

    // Drone Dolce (Tappeto Zen)
    const drone = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 5, release: 10 }
    }).connect(lowPass);

    // Gestione volume reattiva
    const masterVol = new Tone.Volume(-10).toDestination();
    synth.connect(masterVol);
    drone.connect(masterVol);

    const notes = ["C3", "G3", "C4", "D4", "E4", "G4", "A4", "B4"];
    let prevData = null;
    let lastNote = "";

    async function start() {
        await Tone.start();
        await Tone.context.resume();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1500);
                
                // Attiva il drone fisso in sottofondo (dolce)
                drone.triggerAttack(["C2", "G2"], Tone.now());
                
                render();
            };
        } catch (e) { alert("Camera necessaria per l'installazione."); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Analisi Pixel
        const analysisSize = 30;
        const tCanvas = document.createElement('canvas');
        tCanvas.width = analysisSize; tCanvas.height = analysisSize;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, analysisSize, analysisSize);
        const frame = tCtx.getImageData(0, 0, analysisSize, analysisSize);
        const data = frame.data;

        let diff = 0;
        let r = 0, g = 0, b = 0;

        if (prevData) {
            for (let i = 0; i < data.length; i += 4) {
                // Calcola variazione per il silenzio
                diff += Math.abs(data[i] - prevData[i]);
                r += data[i]; g += data[i+1]; b += data[i+2];
            }
        }
        prevData = new Uint8ClampedArray(data);

        // --- GESTIONE REATTIVITÀ E SILENZIO ---
        // Se la variazione è minima (< 8000), silenzia tutto gradualmente
        if (diff < 8000) {
            masterVol.volume.rampTo(-Infinity, 1.2);
        } else {
            masterVol.volume.rampTo(-10, 0.5);
            
            const brightness = (r + g + b) / (data.length / 4 * 3);
            const nIdx = Math.floor((brightness / 255) * notes.length);
            const currentNote = notes[nIdx % notes.length];

            // Aggiorna melodia se cambia la luce
            if (currentNote !== lastNote && brightness > 40) {
                synth.triggerAttackRelease(currentNote, "1n", undefined, 0.3);
                lastNote = currentNote;
            }
        }

        // --- EFFETTO VISIVO PULITO ---
        for (let i = 0; i < 20; i++) {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            const size = (diff / 20000) * 50; 
            ctx.fillStyle = `rgba(255, 255, 255, ${diff/100000})`;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
        }

        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

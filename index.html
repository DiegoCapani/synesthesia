<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Helvetica', sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        #video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.15; 
            filter: grayscale(100%);
            z-index: 1;
        }
        #ui { 
            z-index: 10; 
            text-align: center; 
            transition: opacity 1s ease;
        }
        h1 { 
            font-size: 1.8rem; 
            font-weight: 100; 
            letter-spacing: 8px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }
        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        canvas { display: none; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <h1>Synesthesia</h1>
        <button id="startBtn">Tocca per iniziare</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    // RIPRISTINO SUONO PRIMA VERSIONE + VOLUME ALTO
    const reverb = new Tone.Reverb({ decay: 6, wet: 0.5 }).toDestination();
    
    // PolySynth per polifonia fluida
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 1, sustain: 0.8, release: 3 }
    }).connect(reverb);

    // Incremento volume
    synth.volume.value = 10; 

    const notes = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5"];

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => video.onloadedmetadata = resolve);
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        
        // Scomparsa totale dell'interfaccia
        ui.style.opacity = "0";
        setTimeout(() => { ui.style.display = 'none'; }, 1000);
        
        analyze();
    });

    function analyze() {
        canvas.width = 32;
        canvas.height = 32;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const frame = ctx.getImageData(8, 8, 16, 16);
        let r = 0, g = 0, b = 0;

        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i];
            g += frame.data[i + 1];
            b += frame.data[i + 2];
        }

        const count = frame.data.length / 4;
        r /= count; g /= count; b /= count;

        updateSound(r, g, b);
        requestAnimationFrame(analyze);
    }

    let lastNote = "";

    function updateSound(r, g, b) {
        const brightness = (r + g + b) / 3;
        const noteIndex = Math.floor(mapRange(brightness, 0, 255, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        if (currentNote !== lastNote) {
            // Piccolo fade out per evitare scoppiettii nel cambio nota
            synth.releaseAll(); 
            // Volume basato sulla luminosità (velocity)
            const vel = mapRange(g, 0, 255, 0.2, 0.6);
            synth.triggerAttack(currentNote, Tone.now(), vel);
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }
</script>
</body>
</html>

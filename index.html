<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01 v11</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.6; filter: brightness(1.2) contrast(1.3); }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: screen; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 50px; background: rgba(0,0,0,0.9); }
        h1 { font-weight: 100; letter-spacing: 6px; margin-bottom: 30px; text-transform: uppercase; }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 45px; cursor: pointer; letter-spacing: 3px; font-size: 1em; transition: 0.3s; }
        button:hover { background: #fff; color: #000; }
        .version-tag { margin-top: 25px; font-size: 0.6em; letter-spacing: 4px; opacity: 0.4; text-transform: uppercase; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <div style="letter-spacing: 4px; font-size: 0.7em; margin-bottom: 10px; opacity: 0.5;">CITTÀ VISIBILE 2026</div>
            <h1>ECO-SINESTESIA</h1>
            <button id="startBtn">ATTIVA SCANSIONE</button>
            <div class="version-tag">STAZIONE 01 | v11</div>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- ENGINE AUDIO v11 (New Age Reattivo & Udibile) ---
    const limiter = new Tone.Limiter(-1).toDestination();
    const reverb = new Tone.Reverb({ decay: 10, wet: 0.5 }).connect(limiter);
    
    // PolySynth con due oscillatori per un suono più ricco
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "fatsine", count: 3, spread: 20 },
        envelope: { attack: 1, decay: 0.5, sustain: 0.9, release: 4 }
    }).connect(reverb);
    
    const masterGain = new Tone.Volume(-6).connect(limiter);
    synth.connect(masterGain);

    const scale = ["C3", "G3", "C4", "D4", "E4", "G4", "A4", "B4", "D5"];
    let prevData = null;
    let lastNote = "";

    async function start() {
        await Tone.start();
        // Sblocco audio forzato
        const trigger = new Tone.Oscillator(220, "sine").connect(masterGain).start();
        trigger.stop("+0.2");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1000);
                render();
            };
        } catch (e) { alert("Attiva fotocamera."); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const grid = 32; 
        const tCanvas = document.createElement('canvas');
        tCanvas.width = grid; tCanvas.height = grid;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, grid, grid);
        const data = tCtx.getImageData(0, 0, grid, grid).data;

        let totalMove = 0;
        let brightness = 0;
        let activeX = 0, activeY = 0, activeCount = 0;
        const cellW = canvas.width / grid;
        const cellH = canvas.height / grid;

        for (let y = 0; y < grid; y++) {
            for (let x = 0; x < grid; x++) {
                const i = (y * grid + x) * 4;
                const r = data[i], g = data[i+1], b = data[i+2];
                const bright = (r + g + b) / 3;

                if (prevData) {
                    const d = Math.abs(r - prevData[i]);
                    if (d > 15) totalMove += d;
                }

                if (bright > 160) {
                    activeX += x; activeY += y; activeCount++;
                    if ((x + y) % 2 === 0) {
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.2)`;
                        ctx.beginPath();
                        ctx.arc(x * cellW + cellW/2, y * cellH + cellH/2, bright/30, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                brightness += bright;
            }
        }
        prevData = new Uint8ClampedArray(data);

        // --- GESTIONE AUDIO v11 ---
        // Se c'è movimento rilevato o se sei presente (activeCount)
        if (totalMove > 3000) { 
            masterGain.volume.rampTo(-6, 0.3); // Suono udibile
            
            if (activeCount > 0) {
                const centerX = activeX / activeCount;
                const noteIdx = Math.floor((centerX / grid) * scale.length);
                const currentNote = scale[Tone.Math.clamp(noteIdx, 0, scale.length - 1)];

                if (currentNote !== lastNote) {
                    synth.triggerAttackRelease(currentNote, "1n", undefined, 0.4);
                    lastNote = currentNote;
                }
            }
        } else {
            // Silenzio se immobile
            masterGain.volume.rampTo(-Infinity, 1.5);
            lastNote = "";
            synth.releaseAll();
        }

        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.7; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: screen; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 40px; }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 35px; cursor: pointer; letter-spacing: 3px; text-transform: uppercase; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <h1 style="font-weight: 100; letter-spacing: 3px;">ECO-SINESTESIA</h1>
            <button id="startBtn">INIZIA SCANSIONE</button>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- ENGINE AUDIO ---
    const reverb = new Tone.Reverb({ decay: 10, wet: 0.5 }).toDestination();
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 2, decay: 1, sustain: 1, release: 3 }
    }).connect(reverb);
    
    // Volume con gestione dinamica (parte silenziato)
    const masterOut = new Tone.Volume(-Infinity).toDestination();
    synth.connect(masterOut);

    const notes = ["C4", "E4", "G4", "B4", "C5"];
    let prevData = null;
    let lastNote = "";

    async function start() {
        await Tone.start();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1000);
                render();
            };
        } catch (e) { alert("Camera non disponibile"); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const tCanvas = document.createElement('canvas');
        tCanvas.width = 40; tCanvas.height = 40;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, 40, 40);
        const data = tCtx.getImageData(0, 0, 40, 40).data;

        let movement = 0;
        let brightness = 0;

        if (prevData) {
            for (let i = 0; i < data.length; i += 4) {
                // Differenza netta per pixel
                const d = Math.abs(data[i] - prevData[i]);
                if (d > 50) movement += d; // Ignora micro-rumore della camera
                brightness += (data[i] + data[i+1] + data[i+2]) / 3;
            }
        }
        prevData = new Uint8ClampedArray(data);
        const avgB = brightness / (40 * 40);

        // --- LOGICA DI SILENZIO CORRETTA ---
        // Se il movimento totale è sotto una soglia minima, forziamo il silenzio
        if (movement < 15000) { 
            masterOut.volume.rampTo(-Infinity, 0.8);
            synth.releaseAll(); // Spegne forzatamente le note appese
            lastNote = "";
        } else {
            // Se c'è movimento, il volume sale e le note suonano
            masterOut.volume.rampTo(-10, 0.3);
            
            const nIdx = Math.floor((avgB / 255) * notes.length);
            const currentNote = notes[nIdx % notes.length];

            if (currentNote !== lastNote && avgB > 50) {
                synth.triggerAttackRelease(currentNote, "2n", undefined, 0.4);
                lastNote = currentNote;
            }
        }

        // Effetto visivo particelle
        for (let i = 0; i < 40; i += 2) {
            if (data[i*4] > 180) {
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 2, 0, Math.PI*2);
                ctx.fill();
            }
        }

        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

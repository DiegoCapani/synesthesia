<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(1.1) contrast(1.1); }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: additive; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.3); padding: 40px; background: rgba(0,0,0,0.8); }
        .label { letter-spacing: 5px; font-size: 0.7em; margin-bottom: 10px; opacity: 0.6; }
        h1 { font-weight: 200; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 35px; cursor: pointer; font-size: 0.9em; letter-spacing: 3px; transition: 0.3s; }
        button:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <div class="label">CITTÀ VISIBILE 2026</div>
            <h1>STAZIONE 01: ECO-SINESTESIA</h1>
            <button id="startBtn">ATTIVA SCANSIONE</button>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- ENGINE AUDIO REATTIVO ---
    const reverb = new Tone.Reverb({ decay: 10, wet: 0.5 }).toDestination();
    const filter = new Tone.Filter(1200, "lowpass").connect(reverb);
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 0.1, decay: 0.1, sustain: 1, release: 2 }
    }).connect(filter);

    // Volume master gestito dinamicamente
    const volumeBus = new Tone.Volume(-10).toDestination();
    synth.connect(volumeBus);

    const notes = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "G5"];
    let lastNote = "";
    let prevFrameData = null;

    async function start() {
        try {
            await Tone.start();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1000);
                render();
            };
        } catch (e) { alert("Accesso camera negato."); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const tCanvas = document.createElement('canvas');
        tCanvas.width = 40; tCanvas.height = 40;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, 40, 40);
        const frame = tCtx.getImageData(0, 0, 40, 40);
        const data = frame.data;

        let totalR = 0, totalG = 0, totalB = 0;
        let motionAmount = 0;

        // Calcolo del movimento (differenza tra frame)
        if (prevFrameData) {
            for (let i = 0; i < data.length; i += 4) {
                motionAmount += Math.abs(data[i] - prevFrameData[i]);
            }
        }
        prevFrameData = new Uint8ClampedArray(data);

        // Disegno particelle e calcolo medie
        for (let y = 0; y < 40; y += 2) {
            for (let x = 0; x < 40; x += 2) {
                const i = (y * 40 + x) * 4;
                const r = data[i], g = data[i+1], b = data[i+2];
                const bright = (r + g + b) / 3;

                if (bright > 160) {
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.6)`;
                    const px = (x / 40) * canvas.width;
                    const py = (y / 40) * canvas.height;
                    ctx.beginPath();
                    ctx.arc(px, py, bright/45, 0, Math.PI * 2);
                    ctx.fill();
                }
                totalR += r; totalG += g; totalB += b;
            }
        }

        const count = (40*40)/4;
        updateAudio(totalR/count, totalG/count, totalB/count, motionAmount);
        
        requestAnimationFrame(render);
    }

    function updateAudio(r, g, b, motion) {
        const brightness = (r + g + b) / 3;
        
        // SOGLIA DI SILENZIO: Se il movimento è minimo, sfumiamo a zero
        const motionThreshold = 15000; // Regolabile in base alla sensibilità desiderata
        if (motion < motionThreshold) {
            volumeBus.volume.rampTo(-Infinity, 0.5); // Silenzio graduale
            return; 
        } else {
            volumeBus.volume.rampTo(-6, 0.1); // Riattivazione immediata
        }

        const nIdx = Math.floor((brightness / 256) * notes.length);
        const note = notes[nIdx];

        // Filtro ultra-reattivo basato sulla componente Rossa
        filter.frequency.setTargetAtTime(r * 5 + 300, Tone.now(), 0.1);

        if (note !== lastNote && brightness > 40) {
            synth.releaseAll();
            // L'intensità (velocity) dipende dal movimento rilevato
            const vel = Math.min(motion / 100000, 0.8); 
            synth.triggerAttack(note, Tone.now(), vel);
            lastNote = note;
        }
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

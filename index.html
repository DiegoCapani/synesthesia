<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01 v09</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.5; filter: brightness(1.2) contrast(1.3); }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: screen; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 50px; background: rgba(0,0,0,0.9); }
        h1 { font-weight: 100; letter-spacing: 6px; margin-bottom: 30px; text-transform: uppercase; }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 45px; cursor: pointer; letter-spacing: 3px; font-size: 1em; transition: 0.3s; }
        button:hover { background: #fff; color: #000; }
        .version-tag { margin-top: 25px; font-size: 0.6em; letter-spacing: 4px; opacity: 0.4; text-transform: uppercase; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <div style="letter-spacing: 4px; font-size: 0.7em; margin-bottom: 10px; opacity: 0.5;">CITTÀ VISIBILE 2026</div>
            <h1>ECO-SINESTESIA</h1>
            <button id="startBtn">ATTIVA SCANSIONE</button>
            <div class="version-tag">STAZIONE 01 | v09</div>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- ENGINE AUDIO v09 (Melodia Reattiva) ---
    const limiter = new Tone.Limiter(-1).toDestination();
    const reverb = new Tone.Reverb({ decay: 10, wet: 0.4 }).connect(limiter);
    const delay = new Tone.FeedbackDelay("8n", 0.3).connect(reverb);
    
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 2 }
    }).connect(delay);
    
    // Volume più alto
    const masterGain = new Tone.Volume(0).connect(limiter);
    synth.connect(masterGain);

    const scale = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5", "G5"];
    let prevData = null;
    let noteIndex = 0;
    let lastPlayTime = 0;

    async function start() {
        await Tone.start();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1000);
                render();
            };
        } catch (e) { alert("Attiva fotocamera."); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const grid = 32; 
        const tCanvas = document.createElement('canvas');
        tCanvas.width = grid; tCanvas.height = grid;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, grid, grid);
        const data = tCtx.getImageData(0, 0, grid, grid).data;

        let movement = 0;
        let brightness = 0;
        const cellW = canvas.width / grid;
        const cellH = canvas.height / grid;

        for (let y = 0; y < grid; y++) {
            for (let x = 0; x < grid; x++) {
                const i = (y * grid + x) * 4;
                const r = data[i], g = data[i+1], b = data[i+2];
                const bright = (r + g + b) / 3;

                if (prevData) {
                    const d = Math.abs(r - prevData[i]);
                    if (d > 30) movement += d;
                }

                // Sfere v08 Style (50% density)
                if (bright > 165 && (x + y) % 2 === 0) {
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.3)`;
                    ctx.beginPath();
                    ctx.arc(x * cellW + cellW/2, y * cellH + cellH/2, bright/28, 0, Math.PI * 2);
                    ctx.fill();
                }
                brightness += bright;
            }
        }
        prevData = new Uint8ClampedArray(data);

        // --- LOGICA MELODICA v09 ---
        const now = Tone.now();
        
        // Se il movimento è sufficiente (anche solo girare la testa)
        if (movement > 6000) {
            masterGain.volume.rampTo(0, 0.2);
            
            // Più ti muovi velocemente, più le note sono ravvicinate (minimo 150ms)
            const interval = Math.max(0.15, 0.6 - (movement / 100000));
            
            if (now - lastPlayTime > interval) {
                // Sceglie la nota in base alla luminosità media, ma avanza nell'arpeggio
                const baseIdx = Math.floor((brightness / (grid*grid*255)) * scale.length);
                const note = scale[(baseIdx + noteIndex) % scale.length];
                
                synth.triggerAttackRelease(note, "4n", undefined, 0.4);
                
                noteIndex++;
                lastPlayTime = now;
            }
        } else {
            // Silenzio se immobile
            masterGain.volume.rampTo(-Infinity, 1.5);
            noteIndex = 0; // Resetta la melodia
        }

        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

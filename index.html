<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01 v04</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.8; filter: saturate(0.5) brightness(1.1); }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: screen; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1.2s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 50px; background: rgba(0,0,0,0.85); }
        h1 { font-weight: 100; letter-spacing: 6px; margin-bottom: 30px; text-transform: uppercase; }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; cursor: pointer; letter-spacing: 3px; transition: 0.4s; }
        button:hover { background: #fff; color: #000; }

        #version-tag { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 0.6em; letter-spacing: 4px; opacity: 0.4; z-index: 5; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="version-tag">STAZIONE 01 | v04</div>

    <div id="ui">
        <div class="container">
            <div style="letter-spacing: 4px; font-size: 0.7em; margin-bottom: 10px; opacity: 0.5;">CITTÀ VISIBILE 2026</div>
            <h1>ECO-SINESTESIA</h1>
            <button id="startBtn">INIZIA SCANSIONE</button>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- ENGINE AUDIO v04 ---
    const reverb = new Tone.Reverb({ decay: 8, wet: 0.5 }).toDestination();
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 0.5, decay: 0.2, sustain: 1, release: 4 }
    }).connect(reverb);
    
    // Master Gain per controllo reattività
    const masterGain = new Tone.Volume(-Infinity).toDestination();
    synth.connect(masterGain);

    const notes = ["C4", "D4", "E4", "G4", "A4", "C5"];
    let prevData = null;
    let lastNote = "";

    async function start() {
        await Tone.start();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1200);
                render();
            };
        } catch (e) { alert("Attiva fotocamera."); }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const tCanvas = document.createElement('canvas');
        tCanvas.width = 40; tCanvas.height = 40;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, 40, 40);
        const data = tCtx.getImageData(0, 0, 40, 40).data;

        let movement = 0;
        let brightness = 0;

        if (prevData) {
            for (let i = 0; i < data.length; i += 4) {
                // Analisi differenziale più sensibile
                const d = Math.abs(data[i] - prevData[i]);
                if (d > 20) movement += d; // Abbassata soglia rumore per più reattività
                brightness += (data[i] + data[i+1] + data[i+2]) / 3;
            }
        }
        prevData = new Uint8ClampedArray(data);
        const avgB = brightness / (40 * 40);

        // --- GESTIONE DINAMICA v04 ---
        // Soglia di movimento molto più permissiva
        if (movement < 5000) { 
            masterGain.volume.rampTo(-Infinity, 0.8);
            if (lastNote !== "") { synth.releaseAll(); lastNote = ""; }
        } else {
            // Volume proporzionale al movimento per massima reattività
            const vol = Tone.Math.mapLinear(movement, 5000, 50000, -15, -6);
            masterGain.volume.setTargetAtTime(vol, Tone.now(), 0.1);
            
            const nIdx = Math.floor((avgB / 255) * notes.length);
            const currentNote = notes[nIdx % notes.length];

            if (currentNote !== lastNote && avgB > 40) {
                // Attacco rapido se c'è molto movimento
                synth.triggerAttackRelease(currentNote, "2n", undefined, 0.4);
                lastNote = currentNote;
            }
        }

        // Visual feedback (particelle reattive)
        if (movement > 5000) {
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2);
                ctx.fill();
            }
        }

        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

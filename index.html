<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        /* Camera realistica al 100% di opacità */
        #video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 1; 
            z-index: 1;
        }

        /* Canvas nascosto usato solo per l'analisi dei dati */
        #canvas { display: none; }
        
        #ui { 
            z-index: 10; 
            text-align: center; 
            background: rgba(0,0,0,0.6); 
            padding: 30px; 
            border: 1px solid #ffffff; 
            transition: opacity 0.5s ease;
        }
        
        button { 
            background: transparent; 
            color: #ffffff; 
            border: 1px solid #ffffff; 
            padding: 12px 24px; 
            cursor: pointer; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            font-size: 0.8em; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        button:hover { 
            background: #ffffff; 
            color: #000; 
        }
        
        .label { 
            margin-bottom: 15px; 
            font-size: 1.1em; 
            text-transform: uppercase;
            letter-spacing: 4px; 
            opacity: 0.9;
        }

        #status {
            font-size: 0.7em;
            margin-top: 15px;
            letter-spacing: 1px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="label">Synesthesia</div>
        <button id="startBtn">Tocca per iniziare</button>
        <p id="status">...|||...</p>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    // --- CONFIGURAZIONE AUDIO ---
    const reverb = new Tone.Reverb({ decay: 5, wet: 0.5 }).toDestination();
    const filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 1, sustain: 0.8, release: 3 }
    }).connect(filter);

    synth.volume.value = 5; 

    // Scala Pentatonica
    const notes = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5"];

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => video.onloadedmetadata = resolve);
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        
        // Nascondi interfaccia
        ui.style.display = 'none'; 
        
        analyze();
    });

    function analyze() {
        // Analisi su griglia 64x64
        canvas.width = 64; 
        canvas.height = 64;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Campionamento zona centrale
        const frame = ctx.getImageData(16, 16, 32, 32);
        let r = 0, g = 0, b = 0;

        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i];
            g += frame.data[i + 1];
            b += frame.data[i + 2];
        }

        const count = frame.data.length / 4;
        r /= count; g /= count; b /= count;

        updateSound(r, g, b);
        requestAnimationFrame(analyze);
    }

    let lastNote = "";

    function updateSound(r, g, b) {
        const brightness = (r + g + b) / 3;
        const noteIndex = Math.floor(mapRange(brightness, 0, 255, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        // Filtro dinamico basato sul Rosso
        filter.frequency.rampTo(mapRange(r, 0, 255, 400, 2000), 0.5);

        if (currentNote !== lastNote) {
            synth.releaseAll();
            // Velocity basata sul Verde
            synth.triggerAttack(currentNote, "+0.1", mapRange(g, 0, 255, 0.1, 0.5));
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }
</script>
</body>
</html>

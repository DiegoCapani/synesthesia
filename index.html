<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia | Realistic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        /* Video realistico a pieno schermo */
        #video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 1; /* Rimosso ogni effetto di trasparenza */
            z-index: 1;
        }
        
        /* Canvas nascosto (serve solo per i calcoli matematici) */
        #canvas { 
            display: none; 
        }
        
        #ui { 
            z-index: 10; 
            text-align: center; 
            background: rgba(0,0,0,0.6); 
            padding: 40px; 
            border: 1px solid #ffffff; 
            transition: opacity 0.5s ease;
        }
        
        button { 
            background: transparent; 
            color: #ffffff; 
            border: 1px solid #ffffff; 
            padding: 14px 28px; 
            cursor: pointer; 
            font-family: inherit; 
            font-size: 0.9em; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        button:hover { 
            background: #ffffff; 
            color: #000; 
        }
        
        .label { 
            margin-bottom: 20px; 
            font-size: 1.2em; 
            text-transform: uppercase;
            letter-spacing: 4px; 
            font-weight: 200;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="label">Synesthesia</div>
        <button id="startBtn">Avvia Esperienza</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    // Configurazione Audio
    const reverb = new Tone.Reverb({ decay: 5, wet: 0.4 }).toDestination();
    const filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 0.8, decay: 1, sustain: 0.7, release: 3 }
    }).connect(filter);

    synth.volume.value = 6; 

    const notes = ["C3", "G3", "C4", "D4", "E4", "G4", "A4", "C5"];
    
    let prevFrame = null;
    let lastNote = "";
    let isPlaying = false;

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => video.onloadedmetadata = resolve);
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        ui.style.opacity = "0";
        setTimeout(() => ui.style.display = 'none', 500);
        analyze();
    });

    function analyze() {
        // Analisi a bassa risoluzione per fluidità sonora
        canvas.width = 64; 
        canvas.height = 64;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let motionTotal = 0;
        let rSum = 0, gSum = 0, bSum = 0;

        if (prevFrame) {
            for (let i = 0; i < currentFrame.data.length; i += 4) {
                // Calcolo del movimento puro
                const diff = Math.abs(currentFrame.data[i] - prevFrame.data[i]);
                if (diff > 20) motionTotal += diff; 

                rSum += currentFrame.data[i];
                gSum += currentFrame.data[i+1];
                bSum += currentFrame.data[i+2];
            }
        }
        
        prevFrame = currentFrame;

        const count = canvas.width * canvas.height;
        const r = rSum / count;
        const avgBright = (r + (gSum/count) + (bSum/count)) / 3;

        // Se ti muovi suona, se ti fermi silenzia
        if (motionTotal > 4000) { 
            updateSound(r, avgBright, true);
            isPlaying = true;
        } else {
            if (isPlaying) {
                synth.releaseAll();
                isPlaying = false;
                lastNote = "";
            }
        }

        requestAnimationFrame(analyze);
    }

    function updateSound(r, brightness, shouldPlay) {
        // Mappatura sensibile anche al buio (range 0-130)
        const noteIndex = Math.floor(mapRange(Math.min(brightness, 130), 0, 130, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        // Il filtro reagisce al calore cromatico
        filter.frequency.rampTo(mapRange(Math.min(r, 150), 0, 150, 400, 2200), 0.3);

        if (currentNote !== lastNote && shouldPlay) {
            synth.releaseAll();
            synth.triggerAttack(currentNote, "+0.05", 0.5);
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eco-Sinestesia | Audio Fix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    overflow: hidden;
}
#video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.5;
}
#canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}
#ui {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    z-index: 10;
}
button {
    padding: 20px 40px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <button id="startBtn">ATTIVA AUDIO E VIDEO</button>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let prevData = null;
let lastNote = "";
let lastTriggerTime = 0;
let isAudioOpen = false;

// =========================
// AUDIO ENGINE CORRETTO
// =========================
const limiter = new Tone.Limiter(-1).toDestination();

const reverb = new Tone.Reverb({
    decay: 6,
    wet: 0.35
}).connect(limiter);

const masterGain = new Tone.Volume(-18).connect(reverb);

const synth = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 4,
    options: {
        oscillator: {
            type: "triangle"
        },
        envelope: {
            attack: 0.05,
            decay: 0.3,
            sustain: 0.4,
            release: 1.5
        }
    }
}).connect(masterGain);

const scale = [
    "C3", "G3", "C4", "D4",
    "E4", "G4", "A4", "B4", "D5"
];

async function initAudio() {
    await Tone.start();
    await Tone.loaded();

    // piccolo test
    synth.triggerAttackRelease("C4", "8n", undefined, 0.2);

    console.log("Audio pronto");
}

async function start() {
    await initAudio();

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" }
        });

        video.srcObject = stream;

        await video.play();

        ui.style.display = "none";

        resizeCanvas();
        render();

    } catch (err) {
        alert("Errore accesso camera.");
        console.error(err);
    }
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener("resize", resizeCanvas);

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const grid = 30;

    // canvas temporaneo
    const temp = document.createElement("canvas");
    temp.width = grid;
    temp.height = grid;
    const tctx = temp.getContext("2d");

    tctx.drawImage(video, 0, 0, grid, grid);
    const data = tctx.getImageData(0, 0, grid, grid).data;

    let totalMove = 0;
    let activeX = 0;
    let activeCount = 0;

    for (let y = 0; y < grid; y++) {
        for (let x = 0; x < grid; x++) {
            const i = (y * grid + x) * 4;

            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];

            const bright = (r + g + b) / 3;

            if (prevData) {
                totalMove += Math.abs(r - prevData[i]);
            }

            if (bright > 150) {
                activeX += x;
                activeCount++;

                if ((x + y) % 2 === 0) {
                    ctx.fillStyle = `rgba(${r},${g},${b},0.3)`;
                    ctx.beginPath();
                    ctx.arc(
                        (x / grid) * canvas.width,
                        (y / grid) * canvas.height,
                        bright / 25,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }
            }
        }
    }

    prevData = new Uint8ClampedArray(data);

    // =========================
    // LOGICA AUDIO STABILIZZATA
    // =========================
    const movementThreshold = 2500;
    const now = Tone.now();

    if (totalMove > movementThreshold && activeCount > 0) {
        const centerX = activeX / activeCount;
        const noteIndex = Math.floor((centerX / grid) * scale.length);
        const note = scale[Math.max(0, Math.min(noteIndex, scale.length - 1))];

        // Trigger massimo ogni 250 ms
        if (
            note !== lastNote &&
            now - lastTriggerTime > 0.25
        ) {
            synth.triggerAttackRelease(
                note,
                "2n",
                now,
                0.25
            );

            lastNote = note;
            lastTriggerTime = now;
        }

        // Indicatore visivo
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(
            canvas.width / 2,
            canvas.height / 2,
            20,
            0,
            Math.PI * 2
        );
        ctx.stroke();
    }

    requestAnimationFrame(render);
}

document.getElementById("startBtn").addEventListener("click", start);
</script>
</body>
</html>

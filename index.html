<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eco-Sinestesia | Stazione 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; height: 100vh; }
        #video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; mix-blend-mode: additive; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; z-index: 100; transition: opacity 1.5s; }
        .container { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 50px; background: rgba(0,0,0,0.9); }
        h1 { font-weight: 100; letter-spacing: 5px; margin-bottom: 30px; }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 15px 40px; cursor: pointer; letter-spacing: 3px; transition: 0.4s; }
        button:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div class="container">
            <div style="letter-spacing: 4px; font-size: 0.7em; margin-bottom: 10px; opacity: 0.5;">CITTÀ VISIBILE 2026</div>
            <h1>ECO-SINESTESIA</h1>
            <button id="startBtn">ATTIVA SCANNER</button>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // --- ENGINE MELODICO EVOLUTO ---
    const mainReverb = new Tone.Reverb({ decay: 12, wet: 0.6 }).toDestination();
    const mainDelay = new Tone.FeedbackDelay("4n", 0.4).connect(mainReverb);
    
    // Sintetizzatore per la melodia (Lead cristallino)
    const leadSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 0.5, sustain: 0.6, release: 4 }
    }).connect(mainDelay);
    
    // Sintetizzatore per l'armonia di fondo (Drone/Pad)
    const padSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "fatsawtooth", count: 3, spread: 20 },
        envelope: { attack: 4, release: 8 }
    }).connect(mainReverb);

    leadSynth.volume.value = -12;
    padSynth.volume.value = -25;

    // Scala Pentatonica di Do Maggiore (Celestiale)
    const scale = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5", "G5"];
    let currentBrightness = 0;
    let targetFrequency = 400;

    async function start() {
        await Tone.start();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                ui.style.opacity = '0';
                setTimeout(() => ui.style.display = 'none', 1500);
                
                // Avviamo il loop melodico (Arpeggiatore)
                Tone.Transport.scheduleRepeat((time) => {
                    playMelody(time);
                }, "4n");
                Tone.Transport.start();
                
                render();
            };
        } catch (e) { alert("Attivare la camera."); }
    }

    function playMelody(time) {
        // La melodia dipende dalla luminosità catturata nel render()
        const noteIndex = Math.floor(Tone.Math.mapLinear(currentBrightness, 0, 255, 0, scale.length - 1));
        const note = scale[noteIndex];
        
        // Suoniamo una nota solo se c'è attività luminosa
        if (currentBrightness > 40) {
            leadSynth.triggerAttackRelease(note, "2n", time, 0.4);
            
            // Ogni tanto aggiungiamo un'armonia casuale per rendere il tutto più "musicale"
            if (Math.random() > 0.7) {
                padSynth.triggerAttackRelease(scale[0], "1n", time, 0.2);
            }
        }
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Analisi dati (veloce e leggera)
        const tCanvas = document.createElement('canvas');
        tCanvas.width = 20; tCanvas.height = 20;
        const tCtx = tCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, 20, 20);
        const data = tCtx.getImageData(0, 0, 20, 20).data;

        let r = 0, g = 0, b = 0;
        for (let i = 0; i < data.length; i += 4) {
            r += data[i]; g += data[i+1]; b += data[i+2];
        }
        currentBrightness = (r + g + b) / (data.length / 4 * 3);

        // --- EFFETTO VISIVO (AURA LUMINOSA) ---
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < 30; i++) {
            const size = Math.random() * (currentBrightness / 2);
            ctx.fillStyle = `rgba(${r/(data.length/4)}, ${g/(data.length/4)}, ${b/(data.length/4)}, 0.3)`;
            ctx.beginPath();
            ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, size, 0, Math.PI * 2);
            ctx.fill();
        }

        requestAnimationFrame(render);
    }

    document.getElementById('startBtn').addEventListener('click', start);
</script>
</body>
</html>

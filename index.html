<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        #video { display: none; } /* Video nascosto per usare solo il canvas artistico */

        #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1;
        }

        #ui { 
            z-index: 10; 
            text-align: center; 
            transition: opacity 1s ease; 
        }

        h1 { 
            font-size: 1.8rem; 
            font-weight: 100; 
            letter-spacing: 8px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }

        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <h1>Synesthesia</h1>
        <button id="startBtn">Tocca per iniziare</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    // Configurazione Audio Originale
    const reverb = new Tone.Reverb({ decay: 5, wet: 0.5 }).toDestination();
    const filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 1, sustain: 0.8, release: 3 }
    }).connect(filter);

    synth.volume.value = 0; 

    const notes = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5"];
    let lastNote = "";
    let ghostIntensity = 0.2; // Intensità base dell'eco visiva

    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user' }, 
            audio: false 
        });
        video.srcObject = stream;
        return new Promise((resolve) => {
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                resolve();
            };
        });
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        
        ui.style.opacity = "0";
        setTimeout(() => { ui.style.display = 'none'; }, 1000);
        
        render();
    });

    function render() {
        // EFFETTO GHOST: Disegna un rettangolo semitrasparente invece di pulire il frame
        ctx.fillStyle = `rgba(0, 0, 0, ${ghostIntensity})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Disegna il video corrente in semitrasparenza sopra i frame precedenti
        ctx.globalAlpha = 0.8;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0;

        // Recupera i dati per l'analisi sonora
        analyzePixels();

        // Riporta lentamente l'intensità del ghost al valore base
        if (ghostIntensity > 0.15) ghostIntensity -= 0.01;

        requestAnimationFrame(render);
    }

    function analyzePixels() {
        // Usiamo un piccolo estratto dal centro del canvas per l'analisi
        const size = 10;
        const x = Math.floor(canvas.width / 2 - size / 2);
        const y = Math.floor(canvas.height / 2 - size / 2);
        const frame = ctx.getImageData(x, y, size, size);
        
        let r = 0, g = 0, b = 0;
        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i];
            g += frame.data[i + 1];
            b += frame.data[i + 2];
        }

        const count = frame.data.length / 4;
        updateSound(r / count, g / count, b / count);
    }

    function updateSound(r, g, b) {
        const brightness = (r + g + b) / 3;
        const noteIndex = Math.floor(mapRange(brightness, 0, 255, 0, notes.length - 1));
        const currentNote = notes[noteIndex];

        filter.frequency.rampTo(mapRange(r, 0, 255, 400, 2000), 0.5);

        if (currentNote !== lastNote) {
            synth.releaseAll();
            synth.triggerAttack(currentNote, "+0.1", mapRange(g, 0, 255, 0.1, 0.5));
            
            // Reazione visiva al cambio nota: aumenta l'effetto eco/ghost
            ghostIntensity = 0.05; 
            
            lastNote = currentNote;
        }
    }

    function mapRange(value, inMin, inMax, outMin, outMax) {
        return Math.min(outMax, Math.max(outMin, (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin));
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synesthesia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        /* Il video è attivo ma non renderizzato direttamente per usare il canvas */
        #video { 
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        #canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1;
        }

        #ui { 
            z-index: 10; 
            text-align: center; 
            transition: opacity 1s ease; 
        }

        h1 { 
            font-size: 1.8rem; 
            font-weight: 100; 
            letter-spacing: 8px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }

        button { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <h1>Synesthesia</h1>
        <button id="startBtn">Tocca per iniziare</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    // Setup Audio (Parametri Originali)
    const reverb = new Tone.Reverb({ decay: 5, wet: 0.5 }).toDestination();
    const filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sine" },
        envelope: { attack: 1, decay: 1, sustain: 0.8, release: 3 }
    }).connect(filter);
    synth.volume.value = 0; 

    const notes = ["C4", "D4", "E4", "G4", "A4", "C5", "D5", "E5"];
    let lastNote = "";
    
    // Variabile per controllare la forza dell'eco visivo (risonanza)
    let resonanceAmount = 0.15; 

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user' }, 
                audio: false 
            });
            video.srcObject = stream;
            await new Promise((resolve) => {
                video.onloadeddata = () => {
                    video.play();
                    resolve();
                };
            });
        } catch (err) {
            console.error("Accesso camera negato o non disponibile.");
        }
    }

    startBtn.addEventListener('click', async () => {
        await Tone.start();
        await setupCamera();
        
        ui.style.opacity = "0";
        setTimeout(() => { ui.style.display = 'none'; }, 1000);
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        render();
    });

    function render() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            
            // --- EFFETTO RISONANZA (ECO VISIVO) ---
            // Disegniamo un rettangolo nero semitrasparente. 
            // Più è basso il valore di alpha, più lunga sarà la scia dell'eco.
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(0, 0, 0, ${resonanceAmount})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Disegniamo il frame attuale con una certa opacità per fondersi con l'eco
            ctx.globalAlpha = 0.8;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1.0;

            // Analisi per il suono
            analyze();

            // Ritorno graduale alla risonanza base se è stata alterata
            if (resonanceAmount < 0.15) resonanceAmount += 0.005;
        }
        requestAnimationFrame(render);
    }

    function analyze() {
        // Analisi di una piccola area centrale
        const frame = ctx.getImageData(canvas.width/2 - 5, canvas.height/2 - 5, 10, 10);
        let r = 0, g = 0, b = 0;
        for (let i = 0; i < frame.data.length; i += 4) {
            r += frame.data[i];
            g += frame.data[i + 1];
            b += frame.data[i + 2];
        }
        const count = frame.data.length / 4;
        updateSound(r / count, g / count, b / count);
    }

    function updateSound(r, g, b) {
        const brightness = (r + g + b) / 3;
        const noteIndex = Math.floor((brightness / 256) * notes.length);
        const currentNote = notes[noteIndex];

        filter.frequency.rampTo(400 + (r * 6), 0.5);

        if (currentNote !== lastNote && currentNote !== undefined) {
            synth.releaseAll();
            synth.triggerAttack(currentNote, "+0.1", 0.4);
            
            // Quando la nota cambia, aumentiamo temporaneamente la risonanza visiva (scia più lunga)
            resonanceAmount = 0.05; 
            
            lastNote = currentNote;
        }
    }
</script>
</body>
</html>

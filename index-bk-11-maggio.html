<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SYNESTHESIA | Stazione 01</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    overflow: hidden;
    height: 100vh;
}

#video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    opacity: 0.5;
}

#canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
    mix-blend-mode: screen;
}

#ui {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 100;
    transition: opacity 1s;
}

.container {
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 50px;
    background: rgba(0,0,0,0.9);
}

button {
    background: #fff;
    color: #000;
    border: none;
    padding: 20px 50px;
    cursor: pointer;
    letter-spacing: 3px;
    font-weight: bold;
    text-transform: uppercase;
}

.version-tag {
    margin-top: 25px;
    font-size: 0.7em;
    opacity: 0.5;
    letter-spacing: 4px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
    <div class="container">
        <div style="letter-spacing:4px;font-size:0.7em;opacity:0.6;">CITTÀ VISIBILE 2026</div>
        <h1 style="font-weight:100;letter-spacing:5px;">SYNESTHESIA</h1>
        <button id="startBtn">TOCCA PER INIZIARE</button>
        <div class="version-tag">STAZIONE 01 | CORPO=SUONO</div>
    </div>
</div>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');

let prevData = null;
let lastNote = "";
let lastTriggerTime = 0;

// =========================
// VELOCITÀ CORPO
// =========================
let prevCenterX = null;
let prevCenterY = null;
let prevTime = null;

// =========================
// AUDIO NEW AGE
// =========================

const limiter = new Tone.Limiter(-0.5).toDestination();

const reverb = new Tone.Reverb({
    decay: 18,
    wet: 0.85
}).connect(limiter);

const delay = new Tone.FeedbackDelay({
    delayTime: "4n",
    feedback: 0.35,
    wet: 0.25
}).connect(reverb);

const chorus = new Tone.Chorus({
    frequency: 0.2,
    delayTime: 8,
    depth: 0.7,
    wet: 0.45
}).connect(delay);
chorus.start();

const masterGain = new Tone.Volume(-2).connect(chorus);

// synth principale
const synth = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 8,
    options: {
        oscillator: { type: "sine" },
        envelope: {
            attack: 1.5,
            decay: 0.8,
            sustain: 0.9,
            release: 8
        }
    }
}).connect(masterGain);

// armonico
const shimmer = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony: 6,
    options: {
        oscillator: { type: "triangle" },
        envelope: {
            attack: 1.2,
            decay: 0.5,
            sustain: 0.6,
            release: 6
        }
    }
}).connect(masterGain);

// scala
const scale = [
"C3","D3","E3","G3","A3",
"C4","D4","E4","G4","A4",
"C5","D5"
];

async function initAudio() {
    await Tone.start();
    await Tone.loaded();

    synth.triggerAttackRelease("C4","2n",undefined,0.6);
    shimmer.triggerAttackRelease("G4","1n",undefined,0.3);
}

async function start() {
    await initAudio();

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
    });

    video.srcObject = stream;

    video.onloadedmetadata = async () => {
        await video.play();

        ui.style.opacity = 0;
        setTimeout(()=>ui.style.display="none",1000);

        resizeCanvas();
        render();
    };
}

function resizeCanvas(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

window.addEventListener("resize", resizeCanvas);

// =========================
// LOOP VISIVO + SUONO
// =========================

function render(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const grid = 30;

    const temp = document.createElement("canvas");
    temp.width = grid;
    temp.height = grid;
    const tctx = temp.getContext("2d");

    tctx.drawImage(video,0,0,grid,grid);
    const data = tctx.getImageData(0,0,grid,grid).data;

    let totalMove = 0;
    let activeX = 0;
    let activeCount = 0;

    for(let y=0;y<grid;y++){
        for(let x=0;x<grid;x++){

            const i = (y*grid+x)*4;
            const r=data[i],g=data[i+1],b=data[i+2];

            const bright=(r+g+b)/3;

            if(prevData){
                totalMove += Math.abs(r-prevData[i]);
            }

            if(bright>150){
                activeX += x;
                activeCount++;

                ctx.fillStyle=`rgba(${r},${g},${b},0.25)`;
                ctx.beginPath();
                ctx.arc(
                    (x/grid)*canvas.width,
                    (y/grid)*canvas.height,
                    bright/25,0,Math.PI*2
                );
                ctx.fill();
            }
        }
    }

    prevData = new Uint8ClampedArray(data);

    const now = Tone.now();
    const nowMs = performance.now();

    let speed = 0;
    let intensity = 0;

    if(activeCount>0){

        const centerX = activeX/activeCount;
        const centerY = activeCount/(grid*grid)*grid;

        if(prevCenterX!==null && prevTime!==null){

            const dx=centerX-prevCenterX;
            const dy=centerY-prevCenterY;
            const dt=nowMs-prevTime;

            const dist=Math.sqrt(dx*dx+dy*dy);
            speed=dist/(dt||1);
        }

        intensity=Math.min(speed*8,1);

        prevCenterX=centerX;
        prevCenterY=centerY;
        prevTime=nowMs;

        const noteIndex=Math.floor((centerX/grid)*scale.length);
        const note=scale[Math.max(0,Math.min(noteIndex,scale.length-1))];

        if(totalMove>2500 && now-lastTriggerTime>0.4){

            const gain=0.3+intensity*0.9;
            const duration=intensity>0.6?"8n":"2n";

            synth.triggerAttackRelease(note,duration,now,gain);

            if(intensity>0.2){
                const h=Math.min(scale.length-1,noteIndex+2);
                shimmer.triggerAttackRelease(
                    scale[h],
                    intensity>0.6?"16n":"1n",
                    now+0.03,
                    gain*0.6
                );
            }

            lastTriggerTime=now;
        }

        ctx.strokeStyle="white";
        ctx.beginPath();
        ctx.arc(canvas.width/2,canvas.height/2,20,0,Math.PI*2);
        ctx.stroke();
    }

    requestAnimationFrame(render);
}

document.getElementById("startBtn").addEventListener("click",start);

</script>

</body>
</html>
